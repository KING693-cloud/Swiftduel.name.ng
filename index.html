<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Arena Entry</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --p3: #8b5cf6;
            --dark: #0f172a; --white: rgba(255, 255, 255, 0.98);
            --glass: rgba(255, 255, 255, 0.04);
            --success: #10b981; --err: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; min-height: 100vh;
            background: radial-gradient(circle at bottom left, #1e1b4b, #0f172a);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; color: white; overflow: hidden;
        }

        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--p1); filter: blur(120px);
            opacity: 0.2; border-radius: 50%; z-index: 1;
        }

        .auth-card {
            background: var(--glass); backdrop-filter: blur(25px);
            width: 100%; max-width: 420px; padding: 45px 35px;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            position: relative; z-index: 10;
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area h1 { margin: 0; font-size: 34px; font-weight: 900; letter-spacing: -1.5px; background: linear-gradient(to right, #fff, var(--p1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area p { margin: 8px 0 0; font-size: 14px; opacity: 0.6; font-weight: 600; }

        .input-group { margin-bottom: 22px; position: relative; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin: 0 0 10px 12px; opacity: 0.5; letter-spacing: 1px; }
        
        .fine-input {
            width: 100%; padding: 20px 24px; border-radius: 22px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            color: white; font-size: 16px; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fine-input:focus { border-color: var(--p1); background: rgba(255,255,255,0.1); box-shadow: 0 0 25px rgba(99, 102, 241, 0.25); transform: translateY(-2px); }

        .btn-main {
            width: 100%; padding: 22px; border-radius: 22px; border: none;
            background: linear-gradient(135deg, var(--p1), var(--p3));
            color: white; font-weight: 900; font-size: 17px; margin-top: 15px;
            cursor: pointer; box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        .switcher { text-align: center; margin-top: 30px; font-size: 14px; font-weight: 700; opacity: 0.8; cursor: pointer; transition: 0.2s; }
        .switcher:hover { opacity: 1; color: var(--p1); }
        
        #statusNotice {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            padding: 18px 35px; border-radius: 50px; font-size: 13px; font-weight: 900;
            display: none; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            white-space: nowrap; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideDown { from { top: -80px; opacity: 0; } to { top: 30px; opacity: 1; } }

        .loader {
            position: fixed; inset: 0; background: rgba(7, 11, 20, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--p1); border-radius: 50%; animation: spin 1s infinite linear; }
        .loader p { margin-top: 20px; font-weight: 800; font-size: 12px; letter-spacing: 2px; opacity: 0.6; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -100px; right: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; left: -100px; background: var(--p2);"></div>

    <div id="statusNotice"></div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p id="loaderText">SYNCHRONIZING...</p>
    </div>

    <div class="auth-card">
        <div class="logo-area">
            <h1 id="mTitle">Welcome Back</h1>
            <p id="mSub">Login to your arena profile</p>
        </div>

        <div id="lNameGroup" class="input-group" style="display: none;">
            <label>Full Player Name</label>
            <input type="text" id="lName" class="fine-input" placeholder="Enter username">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="lEmail" class="fine-input" placeholder="warrior@swiftduel.com">
        </div>

        <div class="input-group">
            <label>Secure Password</label>
            <input type="password" id="lPass" class="fine-input" placeholder="••••••••">
        </div>

        <button class="btn-main" id="subBtn" onclick="handleSubmit()">
            <span id="btnText">Enter Arena</span>
        </button>

        <div class="switcher" id="toggleText" onclick="toggle()">New warrior? Create account</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLogin = true;

        function toggle() {
            isLogin = !isLogin;
            document.getElementById('mTitle').innerText = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById('mSub').innerText = isLogin ? "Login to your arena profile" : "Join the elite dueling platform";
            document.getElementById('lNameGroup').style.display = isLogin ? "none" : "block";
            document.getElementById('btnText').innerText = isLogin ? "Enter Arena" : "Begin Journey";
            document.getElementById('toggleText').innerText = isLogin ? "New warrior? Create account" : "Already elite? Login here";
        }

        async function handleSubmit() {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const subBtn = document.getElementById('subBtn');
            
            const name = document.getElementById('lName').value.trim();
            const email = document.getElementById('lEmail').value.trim();
            const pass = document.getElementById('lPass').value.trim();

            if (!email || !pass) return showNotice("Please fill all fields", "err");
            
            loader.style.display = 'flex';
            subBtn.disabled = true;

            try {
                if (!isLogin) {
                    if (name.length < 3) throw new Error("Username must be 3+ characters");

                    loaderText.innerText = "CREATING IDENTITY...";
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const uid = res.user.uid;

                    // Generate user's own referral code for future use
                    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
                    let myCode = "";
                    for (let i = 0; i < 6; i++) myCode += chars.charAt(Math.floor(Math.random() * chars.length));

                    loaderText.innerText = "VERIFYING PERMISSIONS...";
                    await db.collection('users').doc(uid).set({
                        username: name,
                        email: email,
                        balance: 0,
                        referralCode: myCode,
                        totalWithdrawn: 0,
                        totalDeposited: 0,
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    showNotice("Account Created Successfully!", "success");
                } else {
                    loaderText.innerText = "AUTHENTICATING...";
                    await auth.signInWithEmailAndPassword(email, pass);
                    showNotice("Access Granted!", "success");
                }

                setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);

            } catch (e) {
                loader.style.display = 'none';
                subBtn.disabled = false;
                showNotice(e.message, "err");
            }
        }

        function showNotice(msg, type) {
            const n = document.getElementById('statusNotice');
            n.innerText = msg.toUpperCase();
            n.style.background = type === 'success' ? '#10b981' : '#ef4444';
            n.style.display = "block";
            setTimeout(() => n.style.display = "none", 4000);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const isProcessing = document.getElementById('loader').style.display === 'flex';
                if (!isProcessing) {
                    window.location.href = "dashboard.html";
                }
            }
        });
    </script>
</body>
</html>
