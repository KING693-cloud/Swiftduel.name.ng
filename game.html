<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Arena</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --p1: #6366f1; --p2: #ec4899; --p3: #8b5cf6;
            --dark: #0f172a; --white: #ffffff; --accent: #facc15;
            --glass: rgba(255, 255, 255, 0.05); --success: #2ed573;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin:0; padding:0; }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white; padding-bottom: 100px; overflow-x: hidden;
        }

        header {
            background: var(--white); padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            position: sticky; top: 0; z-index: 1000;
        }
        .back-link { text-decoration: none; font-weight: 900; color: var(--p1); font-size: 11px; letter-spacing: 1px; }
        
        .bal-container { 
            background: #f1f5f9; padding: 6px 15px; border-radius: 15px; 
            display: flex; align-items: center; border: 2px solid #e2e8f0;
        }
        .bal-container b { color: var(--dark); font-size: 18px; font-weight: 950; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px 15px; }

        /* Bonus Card - Compact */
        .reward-card {
            background: linear-gradient(135deg, var(--p1), var(--p3));
            border-radius: 25px; padding: 18px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .reward-txt b { display: block; font-size: 17px; color: white; font-weight: 900; }
        .reward-txt span { font-size: 10px; color: white; font-weight: 600; }
        
        .claim-btn {
            background: var(--white); color: var(--p1); border: none;
            padding: 10px 20px; border-radius: 15px; font-weight: 950;
            font-size: 12px; cursor: pointer;
        }

        .section-title { 
            font-size: 10px; font-weight: 900; color: #94a3b8; 
            letter-spacing: 2px; text-transform: uppercase; 
            margin-bottom: 12px; display: block; padding-left: 5px;
        }

        /* Game Grid - Sized to fit screen */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .game-box {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; height: 145px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; backdrop-filter: blur(10px); transition: 0.2s;
        }
        .game-box:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .game-box i { font-size: 45px; margin-bottom: 8px; font-style: normal; }
        .game-box b { color: white; font-size: 13px; font-weight: 900; }
        .game-box span { color: var(--p2); font-size: 9px; font-weight: 900; margin-top: 4px; text-transform: uppercase; }

        /* Navigation */
        .nav {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            padding: 10px 0 25px; display: flex; justify-content: space-around;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }
        .nav-item { text-decoration: none; text-align: center; color: #94a3b8; font-size: 9px; font-weight: 900; }
        .nav-item.active { color: var(--p1); }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; font-style: normal; }

        #successModal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 40px 25px; border-radius: 35px; text-align: center;
            width: 85%; max-width: 320px; color: var(--dark);
        }
    </style>
</head>
<body>

    <header>
        <a href="dashboard.html" class="back-link">◀ LOBBY</a>
        <div class="bal-container">
            <b id="mainBal">₦0.00</b>
        </div>
    </header>

    <div class="container">
        
        <div class="reward-card">
            <div class="reward-txt">
                <b>Daily Bonus</b>
                <span>Get ₦10.00 Free</span>
            </div>
            <button class="claim-btn" id="claimBtn" onclick="secureClaim()">CLAIM</button>
        </div>

        <span class="section-title">Select A Game</span>

        <div class="game-grid">
            <a href="miner.html" class="game-box">
                <i>💎</i><b>MINER PRO</b><span>Play Now</span>
            </a>
            <a href="spin.html" class="game-box">
                <i>🎡</i><b>LUCKY WHEEL</b><span>Predict</span>
            </a>
            <a href="magic.html" class="game-box">
                <i>🔮</i><b>MAGIC BALL</b><span>2x Payout</span>
            </a>
            <a href="xo.html" class="game-box">
                <i>❌</i><b>TIC TAC TOE</b><span>Vs CPU</span>
            </a>
            <a href="cards.html" class="game-box">
                <i>🃏</i><b>HIGH LOW</b><span>Instant</span>
            <a href="rocket.html" class="game-box">
                <i>🚀</i><b>ROCKET RISE</b><span>High Speed</span>
            </a>
        </div>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <div style="font-size: 60px; margin-bottom: 10px;">🌟</div>
            <h2 style="font-weight: 950; margin: 0; font-size: 24px;">REWARD UNLOCKED</h2>
            <p style="font-weight: 600; color: #64748b; margin: 15px 0 30px 0;">₦10.00 added to balance.</p>
            <button onclick="closeModal()" style="width:100%; padding: 18px; border-radius: 15px; border:none; background: var(--p1); color: white; font-weight: 950;">CONTINUE</button>
        </div>
    </div>

    <nav class="nav">
        <a href="dashboard.html" class="nav-item active"><i>🕹️</i><span>Arena</span></a>
        <a href="refer.html" class="nav-item"><i>👥</i><span>Refer</span></a>
        <a href="recharge.html" class="nav-item"><i>💳</i><span>Deposit</span></a>
        <a href="withdraw.html" class="nav-item"><i>💰</i><span>Payout</span></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const balText = document.getElementById('mainBal');
        const claimBtn = document.getElementById('claimBtn');
        let currentLocalBal = 0;

        // SYNC LOGIC
        const cached = localStorage.getItem('swiftBalance') || "0.00";
        currentLocalBal = parseFloat(cached);
        balText.innerText = "₦" + currentLocalBal.toLocaleString(undefined, {minimumFractionDigits: 2});

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        currentLocalBal = data.balance || 0;
                        balText.innerText = "₦" + currentLocalBal.toLocaleString(undefined, {minimumFractionDigits: 2});
                        localStorage.setItem('swiftBalance', currentLocalBal);

                        const today = new Date().toDateString();
                        if (data.lastClaimDate === today) {
                            claimBtn.innerText = "CLAIMED";
                            claimBtn.disabled = true;
                        }
                    }
                });
            } else { window.location.href = "index.html"; }
        });

        async function secureClaim() {
            const user = auth.currentUser;
            if (!user) return;
            const today = new Date().toDateString();
            claimBtn.disabled = true;
            claimBtn.innerText = "...";

            const userRef = db.collection('users').doc(user.uid);
            try {
                const doc = await userRef.get();
                if (doc.exists && doc.data().lastClaimDate === today) {
                    claimBtn.innerText = "CLAIMED";
                    return;
                }
                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(10.00),
                    lastClaimDate: today
                });
                document.getElementById('successModal').style.display = 'flex';
            } catch (err) {
                claimBtn.disabled = false;
                claimBtn.innerText = "CLAIM";
            }
        }

        function closeModal() { document.getElementById('successModal').style.display = 'none'; }
    </script>
</body>
</html>
