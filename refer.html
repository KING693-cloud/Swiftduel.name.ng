<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Arena Referrals</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --white: rgba(255, 255, 255, 0.98);
            --p1: #6366f1; --p2: #ec4899; --p3: #8b5cf6;
            --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05);
            --success: #10b981; --surface: #1e293b;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: flow 15s ease infinite;
            padding-bottom: 120px; color: #fff;
            overflow-x: hidden;
        }
        @keyframes flow { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        /* HEADER AREA */
        header {
            background: var(--white); padding: 15px 25px;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 100;
        }
        .user-meta h2 { margin: 0; font-size: 16px; color: var(--dark); font-weight: 950; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-pill {
            background: var(--dark); color: #fff; padding: 10px 16px; border-radius: 50px;
            font-weight: 900; font-size: 14px; border: 1px solid rgba(255,255,255,0.1);
        }

        .container { padding: 20px; max-width: 480px; margin: auto; }

        /* RECRUITMENT BOX (BONUS) */
        #inviterSection {
            display: none; 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; padding: 25px; margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .locked-ui { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .entry-card h3 { margin: 0 0 8px 0; font-size: 14px; font-weight: 900; text-transform: uppercase; color: var(--p1); }
        .entry-card p { margin: 0 0 18px 0; font-size: 11px; opacity: 0.8; font-weight: 600; line-height: 1.5; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .ref-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 15px; color: #fff; font-weight: 900;
            text-transform: uppercase; font-size: 18px; text-align: center; letter-spacing: 4px;
        }
        .apply-btn {
            width: 100%; background: linear-gradient(to right, var(--p1), var(--p3));
            color: white; border: none; padding: 16px; border-radius: 15px;
            font-weight: 950; font-size: 13px; text-transform: uppercase; cursor: pointer;
        }

        /* REFERRAL DISPLAY CARD */
        .promo-card {
            background: var(--white); border-radius: 30px; padding: 35px 20px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); margin-bottom: 25px; position: relative;
        }
        .promo-card span { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .promo-card h1 { margin: 12px 0; font-size: 40px; font-weight: 950; color: var(--dark); letter-spacing: 5px; }
        .copy-btn {
            width: 100%; padding: 18px; background: var(--dark); color: white; border: none;
            border-radius: 15px; font-weight: 900; font-size: 13px; text-transform: uppercase; cursor: pointer;
        }

        /* RECRUIT LIST */
        .section-title { font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--p2); margin-left: 5px; margin-bottom: 12px; letter-spacing: 1px; }
        .ref-list { display: flex; flex-direction: column; gap: 10px; }
        .ref-row {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .ref-info b { display: block; font-size: 14px; font-weight: 800; color: #f8fafc; text-transform: capitalize; }
        .ref-info span { font-size: 9px; opacity: 0.5; font-weight: 700; text-transform: uppercase; margin-top: 3px; display: block; }
        .status-pill { font-size: 11px; font-weight: 900; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 5px 12px; border-radius: 10px; }

        /* NAVIGATION MENU (MATCHED & PERFECT) */
        .nav {
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-evenly; align-items: center;
            padding: 12px 0 25px 0; border-top-left-radius: 30px; border-top-right-radius: 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4); z-index: 1000;
        }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 25%; }
        .nav-item i { font-size: 20px; font-style: normal; transition: 0.3s; }
        .nav-item span { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }
        .nav-item.active i { transform: translateY(-3px); }
        .nav-item.active span { color: var(--p1); }

        /* NOTIFICATION SYSTEM */
        #statusNotice {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 85%; padding: 18px; border-radius: 20px; z-index: 2000;
            color: white; font-size: 12px; font-weight: 950; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #statusNotice.show { top: 20px; }
    </style>
</head>
<body>

    <div id="statusNotice"></div>

    <header>
        <div class="user-meta">
            <h2 id="userNameDisplay">...</h2>
        </div>
        <div id="mainBalance" class="balance-pill">₦0.00</div>
    </header>

    <div class="container">
        
        <div class="entry-card" id="inviterSection">
            <h3 id="entryHeader">Joining Bonus</h3>
            <p id="entryText">New accounts must deposit to unlock the ₦50 recruitment reward.</p>
            <div class="input-group">
                <input type="text" id="inviterCode" class="ref-input" placeholder="------" maxlength="6">
                <button class="apply-btn" id="applyBtn" onclick="applyInviterCode()">Claim ₦50 Bonus</button>
            </div>
        </div>

        <div class="promo-card">
            <span>Your Personal Code</span>
            <h1 id="displayCode">------</h1>
            <button class="copy-btn" onclick="copyLink()">Copy My Invite Link</button>
        </div>

    </div>

    <nav class="nav">
        <a href="dashboard.html" class="nav-item"><i>🕹️</i><span>Lobby</span></a>
        <a href="refer.html" class="nav-item active"><i>👥</i><span>Refer</span></a>
        <a href="recharge.html" class="nav-item"><i>💳</i><span>Deposit</span></a>
        <a href="withdraw.html" class="nav-item"><i>💰</i><span>Payout</span></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 1. INSTANT LOCAL SYNC (0.0s)
        function syncLocalUI() {
            const name = localStorage.getItem('sd_user_name') || "WARRIOR";
            const bal = localStorage.getItem('sd_user_bal') || "0.00";
            const code = localStorage.getItem('sd_user_code') || "------";
            const used = localStorage.getItem('sd_bonus_done');

            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('mainBalance').innerText = "₦" + parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('displayCode').innerText = code;

            if (used !== 'true') {
                document.getElementById('inviterSection').style.display = 'block';
            }
        }
        syncLocalUI();

        // 2. FIREBASE CORE LOGIC (0.1s Pulse)
        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        
                        // Update UI
                        document.getElementById('userNameDisplay').innerText = d.username || "WARRIOR";
                        document.getElementById('mainBalance').innerText = "₦" + (d.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                        document.getElementById('displayCode').innerText = d.referralCode || "------";
                        
                        // Save to Storage
                        localStorage.setItem('sd_user_name', d.username);
                        localStorage.setItem('sd_user_bal', d.balance);
                        localStorage.setItem('sd_user_code', d.referralCode);

                        // Handle Bonus Box
                        const card = document.getElementById('inviterSection');
                        if (d.usedReferralCode) {
                            localStorage.setItem('sd_bonus_done', 'true');
                            card.style.display = 'none';
                        } else {
                            card.style.display = 'block';
                            const eligible = (d.totalDeposited > 0) || (d.balance > 0);
                            card.classList.toggle('locked-ui', !eligible);
                            document.getElementById('entryHeader').innerText = eligible ? "Claim Your Bonus" : "Bonus Locked";
                        }
                        
                        window.myLink = `https://swiftduel.name.ng/index.html?ref=${d.referralCode}`;
                    }
                });
                loadReferrals(user.uid);
            } else { window.location.href = "index.html"; }
        });

        async function applyInviterCode() {
            const code = document.getElementById('inviterCode').value.trim().toUpperCase();
            const user = auth.currentUser;
            const myCode = document.getElementById('displayCode').innerText;

            if (!code || code === myCode) return showNotice("INVALID CODE", "err");

            const btn = document.getElementById('applyBtn');
            btn.disabled = true; btn.innerText = "AUTHENTICATING...";

            try {
                const refQuery = await db.collection('users').where('referralCode', '==', code).limit(1).get();
                if (refQuery.empty) {
                    showNotice("CODE NOT FOUND", "err");
                    btn.disabled = false; btn.innerText = "Claim ₦50 Bonus";
                    return;
                }

                const inviterId = refQuery.docs[0].id;
                const batch = db.batch();
                
                batch.update(db.collection('users').doc(user.uid), { balance: firebase.firestore.FieldValue.increment(50), usedReferralCode: true });
                batch.update(db.collection('users').doc(inviterId), { balance: firebase.firestore.FieldValue.increment(50) });
                
                const logRef = db.collection('referrals').doc();
                batch.set(logRef, {
                    referrerId: inviterId,
                    refereeId: user.uid,
                    refereeName: document.getElementById('userNameDisplay').innerText,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                await batch.commit();
                localStorage.setItem('sd_bonus_done', 'true');
                document.getElementById('inviterSection').style.display = 'none';
                showNotice("₦50 BONUS GRANTED!", "success");

            } catch (e) {
                showNotice("SYNC ERROR", "err");
                btn.disabled = false;
            }
        }

        function loadReferrals(uid) {
            db.collection('referrals').where('referrerId', '==', uid).orderBy('timestamp', 'desc').onSnapshot(snap => {
                const list = document.getElementById('refList');
                if (snap.empty) {
                    list.innerHTML = `<p style="text-align:center; opacity:0.1; padding:30px; font-size:11px; font-weight:900;">NO RECRUITS FOUND</p>`;
                    return;
                }
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const time = d.timestamp ? d.timestamp.toDate().toLocaleDateString() : 'Just now';
                    list.innerHTML += `
                        <div class="ref-row">
                            <div class="ref-info">
                                <b>${d.refereeName}</b>
                                <span>Verified Recruit • ${time}</span>
                            </div>
                            <div class="status-pill">+₦50</div>
                        </div>`;
                });
            });
        }

        function copyLink() {
            if(!window.myLink) return;
            navigator.clipboard.writeText(window.myLink);
            showNotice("INVITE LINK COPIED!", "success");
        }

        function showNotice(msg, type) {
            const n = document.getElementById('statusNotice');
            n.innerText = msg;
            n.style.background = type === 'success' ? '#10b981' : '#ef4444';
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3500);
        }
    </script>
</body>
</html>
