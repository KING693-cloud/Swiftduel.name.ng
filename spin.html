<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Instant Spin Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --dark: #070b14;
            --white: #ffffff; --gold: #facc15; --glass: rgba(255,255,255,0.07);
            --danger: #ef4444; --success: #10b981;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }

        body {
            height: 100dvh; width: 100vw; font-family: var(--font);
            background: radial-gradient(circle at top, #1e1b4b, #070b14);
            color: white; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed;
        }

        header { 
            width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        
        .exit-link { 
            color: white; text-decoration: none; font-size: 18px; font-weight: 900; 
            background: var(--glass); width: 38px; height: 38px; display: flex; 
            align-items: center; justify-content: center; border-radius: 10px;
        }
        .locked { opacity: 0.1; pointer-events: none; }

        .bal-container { 
            background: var(--white); color: var(--dark); padding: 6px 14px; 
            border-radius: 10px; font-weight: 900; font-size: 13px;
            display: flex; align-items: center; gap: 4px;
        }
        .bal-container span { color: var(--p1); }

        /* FIXED STAGE: Fits all screens */
        .stage { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-evenly; padding: 10px 0;
        }

        .wheel-outer {
            position: relative; width: 280px; height: 280px;
            padding: 6px; background: #1e293b; border-radius: 50%;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
            border: 5px solid #334155;
        }

        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; background: white; border-radius: 50%;
            z-index: 100; border: 4px solid var(--dark);
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 35px solid var(--gold); z-index: 200;
        }

        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            position: relative; transition: transform 4.5s cubic-bezier(0.1, 0, 0.1, 1);
            overflow: hidden; background: #0f172a;
        }

        .segment {
            position: absolute; width: 100%; height: 100%;
            transform-origin: 50% 50%; font-weight: 950; font-size: 12px;
            padding-top: 22px; color: white; text-align: center;
            clip-path: polygon(50% 50%, 34.5% 0%, 65.5% 0%);
        }

        /* SPORTY BOTTOM PANEL */
        .panel {
            width: 100%; background: #0f172a; border-top-left-radius: 30px;
            border-top-right-radius: 30px; padding: 15px 20px 25px;
            border-top: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .stake-selector {
            display: flex; gap: 8px; margin-bottom: 12px; justify-content: center;
        }
        .stake-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 14px; border-radius: 10px; color: #94a3b8;
            font-weight: 800; font-size: 11px;
        }
        .stake-btn.active { background: var(--white); color: var(--dark); border-color: var(--white); }

        .input-row { margin-bottom: 12px; position: relative; }
        .input-box {
            width: 100%; background: #020617; border: 2px solid #1e293b;
            color: var(--gold); padding: 15px; border-radius: 15px;
            font-size: 22px; font-weight: 950; text-align: center;
        }

        .btn-row { display: flex; gap: 10px; }
        .spin-btn {
            flex: 1; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            color: white; font-size: 16px; font-weight: 950; cursor: pointer;
            box-shadow: 0 5px 0 #312e81; text-transform: uppercase;
        }
        .spin-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #312e81; }
        .spin-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        .auto-btn {
            width: 70px; background: #1e293b; border-radius: 15px;
            border: 2px solid #334155; color: white; font-size: 10px;
            font-weight: 900; cursor: pointer;
        }
        .auto-btn.active { background: #facc15; color: #000; border-color: #fff; }

        /* OVERLAYS */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .popup {
            background: white; color: #000; width: 80%; max-width: 300px;
            border-radius: 35px; padding: 35px 20px; text-align: center;
        }
        .popup h2 { font-size: 32px; font-weight: 950; margin-bottom: 5px; }
        .popup button { 
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: var(--dark); color: white; font-weight: 950; margin-top: 15px;
        }

        #toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: var(--danger); color: white; padding: 8px 18px; 
            border-radius: 10px; font-weight: 900; z-index: 6000; display: none;
        }
    </style>
</head>
<body>

    <div id="toast">ERROR</div>

    <header>
        <a href="dashboard.html" id="exitLink" class="exit-link">✕</a>
        <div class="bal-container">₦<span id="balUI">0.00</span></div>
    </header>

    <main class="stage">
        <div class="wheel-outer">
            <div class="pointer"></div>
            <div class="center-hub"></div>
            <div id="wheelCanvas"></div>
        </div>

        <div class="panel">
            <div class="stake-selector">
                <button class="stake-btn active" onclick="qS(50, this)">₦50</button>
                <button class="stake-btn" onclick="qS(100, this)">₦100</button>
                <button class="stake-btn" onclick="qS(500, this)">₦500</button>
                <button class="stake-btn" onclick="qS(1000, this)">₦1k</button>
            </div>
            
            <div class="input-row">
                <input type="number" id="stake" class="input-box" value="50">
            </div>

            <div class="btn-row">
                <button id="spinBtn" class="spin-btn" onclick="pL()">SPIN WHEEL</button>
                <button id="autoBtn" class="auto-btn" onclick="tA()">AUTO</button>
            </div>
        </div>
    </main>

    <div id="resM" class="overlay">
        <div class="popup">
            <h2 id="resT">RESULT</h2>
            <p id="resG" style="font-weight:800; font-size:16px;"></p>
            <button onclick="cM()">CONTINUE</button>
        </div>
    </div>

    <script>
        // DISORDERED CONFIG & DATA
        const f_c = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        firebase.initializeApp(f_c);
        const d_b = firebase.firestore();
        const a_h = firebase.auth();

        let _b = parseFloat(localStorage.getItem('swiftBalance')) || 0;
        let _r = 0;
        let _s = false;
        let _am = false;
        let _ac = 0;

        // SCATTERED SEGMENT WEIGHTS
        const _m = [0.1, 1.5, 0.5, 2.0, 0.1, 1.5, 0.0, 5.0, 0.2, 10.0];
        const _cl = ['#ef4444', '#3b82f6', '#f43f5e', '#10b981', '#ef4444', '#3b82f6', '#1e293b', '#8b5cf6', '#ef4444', '#facc15'];

        const cv = document.getElementById('wheelCanvas');
        _m.forEach((v, i) => {
            const e = document.createElement('div');
            e.className = 'segment';
            e.style.transform = `rotate(${i * 36}deg)`;
            e.style.background = _cl[i];
            e.innerText = v + 'x';
            cv.appendChild(e);
        });

        function sU(v) {
            _b = v;
            document.getElementById('balUI').innerText = _b.toLocaleString(undefined, {minimumFractionDigits:2});
            localStorage.setItem('swiftBalance', _b);
        }

        a_h.onAuthStateChanged(u => {
            if (u) {
                d_b.collection('users').doc(u.uid).onSnapshot(d => {
                    if (d.exists && !_s) sU(d.data().balance || 0);
                });
            }
        });

        function qS(v, b) {
            if(_s) return;
            document.getElementById('stake').value = v;
            document.querySelectorAll('.stake-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        function tA() {
            if(_s) return;
            _am = !_am;
            _ac = _am ? 10 : 0;
            document.getElementById('autoBtn').classList.toggle('active', _am);
            if(_am) pL();
        }

        // DISORDERED LOGIC ENGINE
        async function pL() {
            if(_s) return;
            const k = parseFloat(document.getElementById('stake').value);
            if(k < 50 || k > _b) return;

            _s = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('exitLink').classList.add('locked');
            
            sU(_b - k);
            const r_f = d_b.collection('users').doc(a_h.currentUser.uid);
            r_f.update({ balance: firebase.firestore.FieldValue.increment(-k) });

            // Scattered calculation of result index
            let x;
            const _seed = Math.random();
            const _isH = k >= 500 || k > (_b * 0.4);
            
            // 70% Loss Bias + Mixed logic
            if (_seed < 0.70 || _isH) {
                const _lS = [0, 2, 4, 6, 8];
                x = _lS[Math.floor(Math.random() * 5)];
            } else {
                const _wS = [1, 3, 5, 7, 9];
                x = _wS[Math.floor(Math.random() * 5)];
            }

            const _rotA = (360 * 6) + (360 - (_r % 360)) - (x * 36);
            _r += _rotA;
            cv.style.transform = `rotate(${_r}deg)`;

            setTimeout(async () => {
                const _wN = Math.floor(k * _m[x]);
                sU(_b + _wN);
                await r_f.update({ balance: firebase.firestore.FieldValue.increment(_wN) });

                if(_am && _ac > 1 && _b >= k) {
                    _ac--;
                    _s = false;
                    setTimeout(pL, 1000);
                } else {
                    _am = false;
                    document.getElementById('autoBtn').classList.remove('active');
                    hR(_m[x], _wN);
                }
            }, 4600);
        }

        function hR(m, w) {
            _s = false;
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('exitLink').classList.remove('locked');
            const t = document.getElementById('resT');
            t.innerText = m >= 1 ? "WINNER!" : "RETRY";
            t.style.color = m >= 1 ? "var(--success)" : "var(--danger)";
            document.getElementById('resG').innerText = `Value: ₦${w.toLocaleString()}`;
            document.getElementById('resM').style.display = 'flex';
        }

        function cM() {
            document.getElementById('resM').style.display = 'none';
        }

        sU(_b);
    </script>
</body>
</html>
