<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Instant Spin Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --dark: #070b14;
            --white: #ffffff; --gold: #facc15; --glass: rgba(255,255,255,0.07);
            --danger: #ef4444; --success: #10b981;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }

        body {
            height: 100dvh; width: 100vw; font-family: var(--font);
            background: radial-gradient(circle at top, #1e1b4b, #070b14);
            color: white; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed;
        }

        header { 
            width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        
        .exit-link { 
            color: white; text-decoration: none; font-weight: 900; 
            background: var(--glass); width: 38px; height: 38px; display: flex; 
            align-items: center; justify-content: center; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .locked { opacity: 0.1 !important; pointer-events: none !important; filter: blur(8px); }

        .bal-wrap { 
            background: white; color: var(--dark); padding: 6px 14px; 
            border-radius: 20px; font-weight: 950; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* WHEEL SECTION */
        .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 20px; }

        .wheel-outer {
            position: relative; width: 280px; height: 280px;
            padding: 8px; background: #1e293b; border-radius: 50%;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.2);
            border: 6px solid #334155;
            margin-bottom: 20px;
        }

        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; background: white; border-radius: 50%;
            z-index: 100; border: 5px solid var(--dark); display: flex; align-items: center; justify-content: center;
        }

        .sync-pulse {
            width: 12px; height: 12px; background: var(--p1); border-radius: 50%;
            animation: pulse 1.2s infinite; display: none;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .pointer-needle {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid var(--gold); z-index: 200;
        }

        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            position: relative; 
            /* TURBO SPEED: Reduced from 5s to 2s */
            transition: transform 2s cubic-bezier(0.15, 0, 0.1, 1);
            overflow: hidden; background: #0f172a;
        }

        .segment {
            position: absolute; width: 100%; height: 100%;
            transform-origin: 50% 50%; font-weight: 950; font-size: 10px;
            padding-top: 22px; color: white; text-align: center;
            clip-path: polygon(50% 50%, 34% 0%, 66% 0%);
        }

        /* INTERFACE PANEL */
        .panel {
            width: 100%; background: #0f172a; border-top-left-radius: 35px;
            border-top-right-radius: 35px; padding: 20px 15px 35px;
            border-top: 2px solid rgba(255,255,255,0.08);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
        }

        .stake-grid { display: flex; gap: 6px; margin-bottom: 12px; }
        .stake-pill {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px; border-radius: 12px; color: #94a3b8;
            font-weight: 900; font-size: 11px; flex: 1;
        }
        .stake-pill.active { background: white; color: var(--dark); border-color: white; }
        .stake-pill.disabled { opacity: 0.2; pointer-events: none; }

        .input-wrap { margin-bottom: 15px; position: relative; }
        #stakeInput {
            width: 100%; background: #020617; border: 2px solid #1e293b;
            color: var(--gold); padding: 14px; border-radius: 15px;
            font-size: 22px; font-weight: 950; text-align: center;
            cursor: pointer;
        }
        .edit-hint {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            font-size: 10px; color: #475569; font-weight: 800;
        }

        .action-row { display: flex; gap: 8px; }
        .btn-spin {
            flex: 1; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            color: white; font-size: 16px; font-weight: 950;
            box-shadow: 0 5px 0 #312e81; text-transform: uppercase;
        }
        .btn-spin:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 #312e81; }
        .btn-spin:disabled { opacity: 0.4; filter: grayscale(1); box-shadow: none; }

        .btn-auto {
            width: 80px; background: #1e293b; border-radius: 15px;
            border: 2px solid #334155; color: white; font-size: 10px; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-auto.active { background: var(--gold); color: #000; border-color: #fff; }
        .auto-count { font-size: 12px; margin-top: 2px; }

        #popAlert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 10px 20px; border-radius: 50px;
            font-weight: 950; z-index: 9999; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: 0.4s;
            font-size: 13px;
        }
        #popAlert.show { top: 70px; }

        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            display: none; justify-content: center; align-items: center; z-index: 5000;
            backdrop-filter: blur(5px);
        }
        .modal-card {
            background: white; color: #000; width: 80%; max-width: 300px;
            border-radius: 30px; padding: 35px 20px; text-align: center;
        }
        .modal-card h2 { font-size: 32px; font-weight: 950; margin-bottom: 8px; }
        .modal-card button { 
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--dark); color: white; font-weight: 950; margin-top: 15px;
        }

        #editModal .modal-card { background: #1e293b; color: white; }
        #editModal input {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--p1);
            background: #0f172a; color: var(--gold); font-size: 24px; font-weight: 900;
            text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="popAlert"><span></span></div>

    <header>
        <a href="dashboard.html" id="exitBtn" class="exit-link">✕</a>
        <div class="bal-wrap">₦<span id="balUI">0.00</span></div>
    </header>

    <main class="stage">
        <div class="wheel-outer">
            <div class="pointer-needle"></div>
            <div class="center-hub">
                <div class="sync-pulse" id="hubSync"></div>
            </div>
            <div id="wheel"></div>
        </div>

        <div class="panel">
            <div class="stake-grid">
                <button class="stake-pill active" onclick="setStake(50, this)">₦50</button>
                <button class="stake-pill" onclick="setStake(100, this)">₦100</button>
                <button class="stake-pill" onclick="setStake(500, this)">₦500</button>
                <button class="stake-pill" onclick="setStake(1000, this)">₦1k</button>
            </div>
            
            <div class="input-wrap" onclick="openEdit()">
                <input type="number" id="stakeInput" value="50" readonly>
                <span class="edit-hint">EDIT</span>
            </div>

            <div class="action-row">
                <button id="spinBtn" class="btn-spin" disabled>SYNCING...</button>
                <button id="autoBtn" class="btn-auto" onclick="toggleAuto()" disabled>
                    AUTO <span class="auto-count" id="autoCount">10x</span>
                </button>
            </div>
        </div>
    </main>

    <div id="resModal" class="modal-bg">
        <div class="modal-card">
            <h2 id="resTitle">WIN!</h2>
            <p id="resAmt" style="font-weight:900; font-size:20px; margin: 10px 0;"></p>
            <button onclick="closeModal()">CONTINUE</button>
        </div>
    </div>

    <div id="editModal" class="modal-bg">
        <div class="modal-card">
            <h3>SET STAKE</h3>
            <input type="number" id="customStake" placeholder="Enter amount">
            <button onclick="applyCustomStake()" style="background: var(--p1);">CONFIRM</button>
            <button onclick="closeEdit()" style="background: transparent; color: #94a3b8; margin-top: 5px;">CANCEL</button>
        </div>
    </div>

    <script>
        const f_c = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        firebase.initializeApp(f_c);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let bal = 0, rot = 0, locked = false, isAuto = false, synced = false;
        let autoSpinsLeft = 10;

        const mults = [0.1, 1.5, 0.0, 2.5, 0.1, 1.5, 0.0, 15.0, 0.2, 5.0];
        const clrs = ['#f43f5e', '#3b82f6', '#1e293b', '#10b981', '#f43f5e', '#3b82f6', '#1e293b', '#facc15', '#ef4444', '#8b5cf6'];

        const wheel = document.getElementById('wheel');
        mults.forEach((v, i) => {
            const s = document.createElement('div');
            s.className = 'segment';
            s.style.transform = `rotate(${i * 36}deg)`;
            s.style.background = clrs[i];
            s.innerText = v + 'x';
            wheel.appendChild(s);
        });

        function updateUI(v) {
            bal = v;
            document.getElementById('balUI').innerText = bal.toLocaleString(undefined, {minimumFractionDigits:2});
        }

        auth.onAuthStateChanged(u => {
            if (u) {
                document.getElementById('hubSync').style.display = 'block';
                db.collection('users').doc(u.uid).onSnapshot(doc => {
                    if (!locked) {
                        updateUI(doc.data().balance || 0);
                        if(!synced) {
                            synced = true;
                            enableControls();
                        }
                    }
                });
            }
        });

        function enableControls() {
            const btn = document.getElementById('spinBtn');
            btn.innerText = "SPIN WHEEL";
            btn.disabled = false;
            btn.onclick = start;
            document.getElementById('autoBtn').disabled = false;
            document.getElementById('hubSync').style.display = 'none';
        }

        function setStake(v, b) {
            if(locked) return;
            document.getElementById('stakeInput').value = v;
            document.querySelectorAll('.stake-pill').forEach(x => x.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        function openEdit() {
            if(locked) return;
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('customStake').focus();
        }

        function closeEdit() { document.getElementById('editModal').style.display = 'none'; }

        function applyCustomStake() {
            const val = parseInt(document.getElementById('customStake').value);
            if(val >= 50) {
                setStake(val, null);
                closeEdit();
            } else { pop("Min ₦50"); }
        }

        function toggleAuto() {
            if(locked) return;
            isAuto = !isAuto;
            autoSpinsLeft = 10;
            document.getElementById('autoCount').innerText = "10x";
            document.getElementById('autoBtn').classList.toggle('active', isAuto);
            if(isAuto) start();
        }

        async function start() {
            if(locked || !synced) return;
            const amt = parseFloat(document.getElementById('stakeInput').value);

            if(amt < 50 || amt > bal) {
                isAuto = false;
                document.getElementById('autoBtn').classList.remove('active');
                return pop(amt < 50 ? "Min ₦50" : "Low Bal");
            }

            locked = true;
            uiState(true);
            updateUI(bal - amt);

            const ref = db.collection('users').doc(auth.currentUser.uid);
            await ref.update({ balance: firebase.firestore.FieldValue.increment(-amt) });

            // CUNNY RIGGING
            let idx;
            const seed = Math.random();
            if (seed < 0.72 || amt > (bal * 0.4)) {
                idx = [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)];
            } else {
                idx = [1, 3, 5, 9][Math.floor(Math.random() * 4)];
                if(Math.random() > 0.98) idx = 7;
            }

            const move = (360 * 6) + (360 - (rot % 360)) - (idx * 36);
            rot += move;
            wheel.style.transform = `rotate(${rot}deg)`;

            // TURBO TIMING: Match with CSS 2s transition
            setTimeout(async () => {
                const win = Math.floor(amt * mults[idx]);
                updateUI(bal + win);
                await ref.update({ balance: firebase.firestore.FieldValue.increment(win) });

                if(isAuto) {
                    autoSpinsLeft--;
                    document.getElementById('autoCount').innerText = autoSpinsLeft + "x";
                    
                    if(autoSpinsLeft > 0 && bal >= amt) {
                        locked = false;
                        setTimeout(start, 500); // Fast 0.5s pause between turbo spins
                    } else {
                        isAuto = false;
                        document.getElementById('autoBtn').classList.remove('active');
                        document.getElementById('autoCount').innerText = "10x";
                        show(mults[idx], win);
                    }
                } else {
                    show(mults[idx], win);
                }
            }, 2100); 
        }

        function uiState(l) {
            document.getElementById('spinBtn').disabled = l;
            document.getElementById('exitBtn').classList.toggle('locked', l);
            document.querySelectorAll('.stake-pill').forEach(x => x.classList.toggle('disabled', l));
        }

        function show(m, w) {
            locked = false;
            uiState(false);
            const t = document.getElementById('resTitle');
            t.innerText = m >= 1 ? "WINNER!" : "TRY AGAIN";
            t.style.color = m >= 1 ? "var(--success)" : "var(--danger)";
            document.getElementById('resAmt').innerText = m >= 1 ? `₦${w.toLocaleString()}` : "LOSE";
            document.getElementById('resModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('resModal').style.display = 'none'; }
        
        function pop(m) {
            const a = document.getElementById('popAlert');
            a.querySelector('span').innerText = m;
            a.classList.add('show');
            setTimeout(() => a.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
