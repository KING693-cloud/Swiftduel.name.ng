<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwiftDuel | Miner Flash-Vault Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --dark: #070b14;
            --white: #ffffff; --gold: #facc15; --glass: rgba(255,255,255,0.05);
            --danger: #ff4757; --success: #2ed573; --tile: #1e293b;
            --neon: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* STRICT VIEWPORT LOCK */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; user-select: none; }

        body {
            width: 100vw; height: 100dvh; font-family: 'Inter', system-ui, sans-serif;
            background: #020617;
            color: white; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed;
        }

        .prism-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            z-index: -1;
        }

        header { 
            height: 70px; width: 100%; padding: 0 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        
        #exitBtn {
            color: white; text-decoration: none; font-weight: 900; 
            background: var(--glass); width: 35px; height: 35px; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; transition: 0.3s;
        }
        #exitBtn.locked { opacity: 0.1; pointer-events: none; filter: blur(4px); }

        .bal-pill { 
            background: var(--white); color: var(--dark); padding: 8px 18px; 
            border-radius: 50px; font-weight: 950; font-size: 14px;
            box-shadow: var(--neon);
        }

        /* AUTO-SCALING CONTENT */
        .content { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: space-evenly; align-items: center; 
            padding: 10px 20px; z-index: 10; 
        }

        .status-box { text-align: center; }
        #statusMsg { 
            font-size: 9px; font-weight: 950; color: var(--p1); 
            letter-spacing: 3px; text-transform: uppercase;
        }

        .mine-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 6px; width: 100%; max-width: 340px; 
        }

        .tile {
            aspect-ratio: 1; background: var(--tile); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: rgba(255,255,255,0.01);
        }

        .tile.gem { background: var(--success); color: white; transform: scale(0.9); border: none; box-shadow: 0 0 15px var(--success); }
        .tile.bomb { background: var(--danger); color: white; border: none; animation: pop 0.3s; box-shadow: 0 0 20px var(--danger); }

        @keyframes pop { 0% {transform:scale(1)} 50% {transform:scale(1.2)} 100% {transform:scale(1)} }

        /* INTERFACE PANEL */
        .controls { width: 100%; max-width: 340px; }
        
        #setupArea { transition: 0.4s; }
        #setupArea.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); height: 0; overflow: hidden; }

        .input-row { position: relative; margin-bottom: 12px; }
        .input-row span { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-weight: 950; color: var(--gold); }
        .input-row input {
            width: 100%; background: rgba(0,0,0,0.4); border: 2px solid #1e293b; color: white;
            padding: 16px 15px 16px 45px; border-radius: 15px; font-size: 20px; font-weight: 950; text-align: center;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            font-weight: 950; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-start { background: linear-gradient(135deg, var(--p1), var(--p2)); color: white; }
        .btn-cash { background: var(--gold); color: var(--dark); display: none; }

        /* NOTIFICATIONS */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 12px 25px; border-radius: 50px;
            font-weight: 950; font-size: 13px; z-index: 5000; transition: 0.4s;
        }
        #toast.active { top: 25px; }

        .overlay { position: fixed; inset: 0; background: rgba(7, 11, 20, 0.98); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: white; color: var(--dark); padding: 35px; border-radius: 35px; text-align: center; width: 85%; max-width: 320px; }
        
        .system-logs {
            width: 100%; display: flex; justify-content: space-between;
            padding: 10px 20px; font-size: 8px; font-weight: 800; color: #475569;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="prism-bg"></div>
    <div id="toast">MINIMUM ₦50</div>

    <header>
        <a href="game.html" id="exitBtn">✕</a>
        <div class="bal-pill">₦<span id="balUI">0.00</span></div>
    </header>

    <div class="content">
        <div class="status-box">
            <div id="statusMsg">VAULT CONNECTED: 3 MINES</div>
        </div>

        <div class="mine-grid" id="grid"></div>

        <div class="controls">
            <div id="setupArea">
                <div class="input-row"><span>₦</span><input type="number" id="stake" placeholder="0"></div>
                <button class="btn btn-start" onclick="startMine()">Start Extraction</button>
            </div>
            <button id="cashoutBtn" class="btn btn-cash" onclick="cashout()">Cashout</button>
        </div>
    </div>

    <div class="system-logs">
        <span>Vault_Secure_V2</span>
        <span>Latency_Minimal</span>
    </div>

    <div id="resOverlay" class="overlay">
        <div class="modal">
            <h1 id="resTitle" style="font-size: 40px; font-weight: 950; letter-spacing: -2px;">WIN</h1>
            <p id="resSub" style="font-weight: 800; color: #64748b; margin: 15px 0;"></p>
            <button class="btn" style="background:var(--dark); color:white;" onclick="resetArena()">Next Round</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let balance = parseFloat(localStorage.getItem('swiftBalance')) || 0;
        let gameActive = false;
        let lock = false; 
        let jewels = 0;
        let currentBet = 0;

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2500);
        }

        function sync(v) {
            if(isNaN(v)) v = 0;
            balance = v;
            document.getElementById('balUI').innerText = balance.toLocaleString(undefined, {minimumFractionDigits:2});
            localStorage.setItem('swiftBalance', balance.toFixed(2));
        }

        auth.onAuthStateChanged(user => {
            if (user) db.collection('users').doc(user.uid).onSnapshot(doc => {
                if (doc.exists && !gameActive) sync(doc.data().balance || 0);
            });
        });

        function buildGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const t = document.createElement('div');
                t.className = 'tile'; t.innerHTML = '●';
                t.onclick = () => tapTile(t);
                grid.appendChild(t);
            }
        }

        async function startMine() {
            const stakeInp = document.getElementById('stake').value;
            const stake = parseFloat(stakeInp);

            if (!stakeInp || isNaN(stake) || stake < 50) return showToast("MINIMUM ₦50 REQUIRED");
            if (stake > balance) return showToast("INSUFFICIENT BALANCE");

            gameActive = true; lock = false; jewels = 0; currentBet = stake;
            sync(balance - stake);
            db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-stake) });

            // HIDE UI & LOCK EXIT
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('exitBtn').classList.add('locked');
            document.getElementById('cashoutBtn').style.display = 'block';
            document.getElementById('cashoutBtn').innerText = `Cashout ₦${stake.toFixed(2)}`;
            buildGrid();
        }

        function tapTile(t) {
            if (!gameActive || t.classList.contains('gem') || t.classList.contains('bomb') || lock) return;

            const isTrap = currentBet >= (balance + currentBet) * 0.60;
            let boom = false;
            let luck = Math.random();

            if (isTrap) {
                if (jewels >= 1 && luck < 0.85) boom = true; 
            } else {
                if (luck < 0.45) boom = true; 
            }

            if (boom) {
                t.classList.add('bomb'); t.innerHTML = '💣';
                finish(false);
            } else {
                t.classList.add('gem'); t.innerHTML = '💎';
                jewels++;
                let multi = 1 + (jewels * 0.42);
                document.getElementById('cashoutBtn').innerText = `Cashout ₦${(currentBet * multi).toFixed(2)}`;
                document.getElementById('statusMsg').innerText = `MULTIPLIER: x${multi.toFixed(2)}`;
            }
        }

        async function cashout() {
            if (!gameActive || jewels === 0 || lock) return;
            lock = true; 
            gameActive = false; 
            document.getElementById('cashoutBtn').style.display = 'none';

            let win = currentBet * (1 + (jewels * 0.42));
            sync(balance + win);
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(win) });
            finish(true, win);
        }

        function finish(won, amt) {
            gameActive = false;
            document.getElementById('exitBtn').classList.remove('locked');
            setTimeout(() => {
                const over = document.getElementById('resOverlay');
                document.getElementById('resTitle').innerText = won ? "SECURED" : "EXPLODED";
                document.getElementById('resTitle').style.color = won ? "var(--success)" : "var(--danger)";
                document.getElementById('resSub').innerText = won ? `+₦${amt.toFixed(2)}` : "-₦" + currentBet.toFixed(2);
                over.style.display = 'flex';
            }, 100);
        }

        function resetArena() {
            document.getElementById('resOverlay').style.display = 'none';
            document.getElementById('setupArea').classList.remove('hidden');
            document.getElementById('cashoutBtn').style.display = 'none';
            document.getElementById('statusMsg').innerText = "VAULT CONNECTED: 3 MINES";
            buildGrid();
        }

        buildGrid();
        sync(balance);
    </script>
</body>
</html>
