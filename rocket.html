<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Instant Spin Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --dark: #070b14;
            --white: #ffffff; --gold: #facc15; --glass: rgba(255,255,255,0.07);
            --danger: #ef4444; --success: #10b981;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; margin: 0; padding: 0;
        }

        body {
            min-height: 100dvh;
            font-family: var(--font);
            background: radial-gradient(circle at top, #1e1b4b, #070b14);
            color: white; display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Responsive Header */
        header { 
            width: 100%; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        
        .exit-link { 
            color: white; text-decoration: none; font-size: 18px; font-weight: 900; 
            background: var(--glass); width: 42px; height: 42px; display: flex; 
            align-items: center; justify-content: center; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .locked { opacity: 0.2; pointer-events: none; }

        .bal-container { 
            background: var(--white); color: var(--dark); padding: 8px 18px; 
            border-radius: 12px; font-weight: 900; font-size: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px;
        }
        .bal-container span { font-variant-numeric: tabular-nums; color: var(--p1); }

        /* Stage & Wheel Layout */
        .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .wheel-outer {
            position: relative; width: 320px; height: 320px;
            padding: 10px; background: #1e293b; border-radius: 50%;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.3);
            border: 5px solid #334155; margin-bottom: 25px;
        }

        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 45px; height: 45px; background: white; border-radius: 50%;
            z-index: 100; border: 4px solid var(--dark);
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 35px solid var(--gold); z-index: 200;
        }

        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            position: relative; transition: transform 4s cubic-bezier(0.2, 0, 0.1, 1);
            overflow: hidden; background: #0f172a;
        }

        .segment {
            position: absolute; width: 100%; height: 100%;
            transform-origin: 50% 50%; font-weight: 950; font-size: 14px;
            padding-top: 22px; color: white; text-align: center;
            clip-path: polygon(50% 50%, 34.5% 0%, 65.5% 0%);
        }

        /* Betting Controls */
        .panel {
            width: 92%; max-width: 400px; background: rgba(15, 23, 42, 0.8);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-box {
            width: 100%; background: #020617; border: 2px solid #1e293b;
            color: var(--gold); padding: 18px; border-radius: 18px;
            font-size: 24px; font-weight: 950; text-align: center; margin-bottom: 20px;
        }

        .btn-row { display: flex; gap: 12px; }
        .spin-btn {
            flex: 1; padding: 20px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--p1), var(--p2));
            color: white; font-size: 18px; font-weight: 950; cursor: pointer;
            box-shadow: 0 5px 0 #4338ca;
        }
        .spin-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #4338ca; }
        .spin-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        .auto-btn {
            width: 80px; height: 80px; background: #1e293b;
            border-radius: 18px; border: 2px solid #334155; color: white;
            font-size: 11px; font-weight: 900; cursor: pointer;
        }
        .auto-btn.active { border-color: var(--gold); color: var(--gold); }

        /* Popup Modals */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .popup {
            background: white; color: #000; width: 85%; max-width: 300px;
            border-radius: 35px; padding: 40px 20px; text-align: center;
        }
        .popup h2 { font-size: 32px; font-weight: 950; margin-bottom: 10px; }
        .popup button { 
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--dark); color: white; font-weight: 950;
        }

        #toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: var(--danger); padding: 10px 20px; border-radius: 10px;
            font-weight: 900; z-index: 6000; display: none;
        }
    </style>
</head>
<body>

    <div id="toast">ERROR</div>

    <header>
        <a href="dashboard.html" id="exitLink" class="exit-link">✕</a>
        <div class="bal-container">₦<span id="balUI">0.00</span></div>
    </header>

    <main class="stage">
        <div class="wheel-outer">
            <div class="pointer"></div>
            <div class="center-hub"></div>
            <div id="wheelCanvas"></div>
        </div>

        <div class="panel">
            <input type="number" id="stake" class="input-box" value="100">
            <div class="btn-row">
                <button id="spinBtn" class="spin-btn">SPIN NOW</button>
                <button id="autoBtn" class="auto-btn">AUTO<br>10X</button>
            </div>
            <p id="info" style="text-align:center; font-size:10px; margin-top:15px; color:#64748b; font-weight:900;"></p>
        </div>
    </main>

    <div id="resultModal" class="overlay">
        <div class="popup">
            <h2 id="resTitle">WIN!</h2>
            <p id="resMsg" style="margin-bottom:20px; font-weight:700; color:#444;"></p>
            <button onclick="closeModal()">CONTINUE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let bal = parseFloat(localStorage.getItem('swiftBalance')) || 0;
        let rot = 0;
        let spinning = false;
        let autoLeft = 0;

        const segments = [
            { m: 0.1, c: '#ef4444' }, { m: 2.0, c: '#10b981' },
            { m: 0.5, c: '#f43f5e' }, { m: 5.0, c: '#8b5cf6' },
            { m: 0.2, c: '#ef4444' }, { m: 1.5, c: '#3b82f6' },
            { m: 0.0, c: '#1e293b' }, { m: 3.0, c: '#ec4899' },
            { m: 0.4, c: '#f59e0b' }, { m: 10.0, c: '#facc15' }
        ];

        // Draw Wheel Segments
        const canvas = document.getElementById('wheelCanvas');
        segments.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'segment';
            el.style.transform = `rotate(${i * 36}deg)`;
            el.style.background = s.c;
            el.innerText = s.m + 'x';
            canvas.appendChild(el);
        });

        function syncUI(v) {
            bal = v;
            document.getElementById('balUI').innerText = bal.toLocaleString(undefined, {minimumFractionDigits:2});
            localStorage.setItem('swiftBalance', bal);
        }

        auth.onAuthStateChanged(u => {
            if (u) {
                db.collection('users').doc(u.uid).onSnapshot(d => {
                    if (d.exists && !spinning) syncUI(d.data().balance || 0);
                });
            }
        });

        function msg(t) {
            const el = document.getElementById('toast');
            el.innerText = t; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        document.getElementById('autoBtn').onclick = () => {
            if(spinning) return;
            autoLeft = 10;
            document.getElementById('autoBtn').classList.add('active');
            play();
        };

        document.getElementById('spinBtn').onclick = () => {
            autoLeft = 0;
            play();
        };

        async function play() {
            if(spinning) return;
            
            const stake = parseFloat(document.getElementById('stake').value);
            if(stake < 50) return msg("MIN BET ₦50");
            if(stake > bal) return msg("LOW BALANCE");

            spinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('exitLink').classList.add('locked');
            
            // 1. INSTANT LOCAL DEDUCTION
            syncUI(bal - stake);
            
            // 2. BACKGROUND FIREBASE SYNC
            const ref = db.collection('users').doc(auth.currentUser.uid);
            ref.update({ balance: firebase.firestore.FieldValue.increment(-stake) });

            // 3. CUNNY LOGIC (House Edge)
            let idx;
            const r = Math.random();
            const isBig = stake > (bal * 0.4);

            if (isBig && r < 0.85) {
                idx = [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)]; // Force loss
            } else {
                idx = r < 0.6 ? [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)] : [1, 3, 5, 7, 9, 1, 3][Math.floor(Math.random() * 7)];
            }

            // 4. ANIMATION MATH
            const finalRot = (360 * 5) + (360 - (rot % 360)) - (idx * 36);
            rot += finalRot;
            canvas.style.transform = `rotate(${rot}deg)`;

            // 5. RESOLVE
            setTimeout(async () => {
                const win = Math.floor(stake * segments[idx].m);
                
                // ADD WIN LOCALLY
                syncUI(bal + win);
                // SYNC FIREBASE
                await ref.update({ balance: firebase.firestore.FieldValue.increment(win) });

                if(autoLeft > 1) {
                    autoLeft--;
                    spinning = false;
                    document.getElementById('info').innerText = "AUTO SPINS: " + autoLeft;
                    setTimeout(play, 800);
                } else {
                    showResult(segments[idx].m, win);
                }
            }, 4100);
        }

        function showResult(m, w) {
            spinning = false;
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('exitLink').classList.remove('locked');
            document.getElementById('autoBtn').classList.remove('active');
            document.getElementById('info').innerText = "";

            const t = document.getElementById('resTitle');
            t.innerText = m >= 1 ? "WINNER!" : "LOST";
            t.style.color = m >= 1 ? "var(--success)" : "var(--danger)";
            document.getElementById('resMsg').innerText = `You won ₦${w.toLocaleString()}`;
            document.getElementById('resultModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        syncUI(bal);
    </script>
</body>
</html>
