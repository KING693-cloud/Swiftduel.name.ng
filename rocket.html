<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwiftDuel | Rocket Pro Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #ef4444; --dark: #020617; --white: #ffffff;
            --gold: #facc15; --danger: #ff3e3e; --success: #10b981;
            --glass: rgba(255, 255, 255, 0.05);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --neon: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        /* STRICT VIEWPORT LOCK */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; user-select: none; }

        body {
            height: 100dvh; width: 100vw; font-family: var(--font);
            background: #020617; color: white; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed;
        }

        .prism-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 0%, #1e1b4b, #020617);
            z-index: -1;
        }

        header { 
            height: 70px; width: 100%; padding: 0 18px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        
        #exitBtn { 
            color: white; text-decoration: none; font-weight: 800; background: var(--glass); 
            width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; transition: 0.3s;
        }
        #exitBtn.locked { opacity: 0.1; pointer-events: none; filter: blur(4px); }

        .bal-wrap { 
            background: white; color: var(--dark); padding: 8px 18px; border-radius: 50px; 
            font-weight: 950; font-size: 14px; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* GAME STAGE */
        .stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .radar { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; }

        .loader-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .loader-svg circle { fill: none; stroke-width: 5; stroke-dasharray: 754; stroke-linecap: round; transition: 0.1s linear; }
        
        #betRing { stroke: var(--success); display: none; }
        #syncRing { stroke: var(--danger); display: none; stroke-dashoffset: 0; }
        .blink { animation: blinker 0.6s infinite; }
        @keyframes blinker { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .blast-wave {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--danger) 0%, transparent 70%);
            opacity: 0; pointer-events: none; z-index: 4; border-radius: 50%;
        }
        .blast-wave.active { animation: supernovaEffect 0.6s ease-out forwards; }
        @keyframes supernovaEffect { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1.2); opacity: 0; } }

        .orbit {
            position: relative; width: 210px; height: 210px;
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        #rocket {
            position: absolute; width: 20px; height: 20px; background: var(--p1); 
            border-radius: 50%; box-shadow: var(--neon);
            top: -10px; left: 50%; margin-left: -10px; transform-origin: center 115px;
            display: none; z-index: 6;
        }

        .mult-val { font-size: 52px; font-weight: 950; text-align: center; z-index: 10; letter-spacing: -2px; }
        .status-txt { position: absolute; top: -15%; width: 100%; text-align: center; font-size: 9px; font-weight: 950; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }

        /* CONTROL TERMINAL */
        .terminal { background: #0f172a; padding: 25px 20px 45px; border-top-left-radius: 40px; border-top-right-radius: 40px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .panel { background: rgba(2, 6, 23, 0.6); padding: 18px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }

        .row { display: flex; gap: 12px; margin-bottom: 15px; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .col label { font-size: 8px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; }

        .stepper { display: flex; align-items: center; background: #010410; border-radius: 15px; border: 1px solid #1e293b; height: 55px; overflow: hidden; transition: 0.3s; }
        .stepper.locked { opacity: 0.3; pointer-events: none; background: #070b14; }
        
        .s-btn { width: 45px; height: 100%; background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        .val-i { flex: 1; background: none; border: none; color: var(--gold); text-align: center; font-size: 20px; font-weight: 950; width: 30px; }

        .btn-main {
            width: 100%; height: 75px; border-radius: 20px; border: none;
            background: #1e293b; color: white; font-size: 18px; font-weight: 950;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
            box-shadow: 0 6px 0 #000;
        }
        .btn-main.bet-on { background: var(--success); box-shadow: 0 6px 0 #065f46; }
        .btn-main.cash-on { background: var(--gold); color: #000; box-shadow: 0 6px 0 #a16207; }
        .btn-main:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .btn-main:disabled { opacity: 0.4; pointer-events: none; }

        #alert-box {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 30px; border-radius: 50px;
            font-weight: 950; font-size: 13px; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #alert-box.show { top: 85px; }

        .system-logs {
            width: 100%; display: flex; justify-content: space-between;
            padding: 10px 20px; font-size: 8px; font-weight: 800; color: #475569;
            text-transform: uppercase; letter-spacing: 1px; background: #0f172a;
        }
    </style>
</head>
<body>

    <div class="prism-bg"></div>
    <div id="alert-box"><span></span></div>

    <header>
        <a href="game.html" id="exitBtn">✕</a>
        <div class="bal-wrap">₦<span id="uiBal">0.00</span></div>
    </header>

    <main class="stage">
        <div class="status-txt" id="stateTag">INITIALIZING</div>
        <div class="blast-wave" id="blast"></div>
        
        <div class="radar">
            <svg class="loader-svg">
                <circle cx="130" cy="130" r="120" id="betRing"></circle>
                <circle cx="130" cy="130" r="120" id="syncRing"></circle>
            </svg>
            <div class="orbit">
                <div id="multUI" class="mult-val">1.00x</div>
                <div id="rocket"></div>
            </div>
        </div>
    </main>

    <div class="terminal">
        <div class="panel">
            <div class="row">
                <div class="col">
                    <label>STAKE AMOUNT</label>
                    <div class="stepper" id="s1">
                        <button class="s-btn" onclick="adj('stake', -50)">−</button>
                        <input type="number" id="stake" class="val-i" value="100" readonly>
                        <button class="s-btn" onclick="adj('stake', 50)">+</button>
                    </div>
                </div>
                <div class="col">
                    <label>AUTO CASHOUT</label>
                    <div class="stepper" id="s2">
                        <button class="s-btn" onclick="adj('auto', -0.1)">−</button>
                        <input type="number" id="auto" class="val-i" value="2.0" step="0.1" readonly>
                        <button class="s-btn" onclick="adj('auto', 0.1)">+</button>
                    </div>
                </div>
            </div>
            <button id="mainBtn" class="btn-main" onclick="handleInput()">SYNCING...</button>
        </div>
    </div>

    <div class="system-logs">
        <span>ROCKET_CORE_V4</span>
        <span>LATENCY: 12ms</span>
    </div>

    <script>
        const config = { 
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40", 
            authDomain: "swiftduel.firebaseapp.com", 
            projectId: "swiftduel", 
            storageBucket: "swiftduel.firebasestorage.app", 
            messagingSenderId: "114652592444", 
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639" 
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let bal = 0, isBet = false, isQ = false, isOut = false, ridCur = 0;

        function showPop(msg) {
            const p = document.getElementById('alert-box');
            p.querySelector('span').innerText = msg;
            p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 2500);
        }

        function setBal(n) { 
            if(isNaN(n)) n = 0;
            bal = Math.max(0, n); 
            document.getElementById('uiBal').innerText = bal.toLocaleString(undefined, {minimumFractionDigits:2});
            localStorage.setItem('swiftBalance', bal.toFixed(2));
        }

        auth.onAuthStateChanged(u => {
            if(u) db.collection('users').doc(u.uid).onSnapshot(s => { 
                if(!isBet && !isQ) setBal(s.data().balance || 0); 
            });
        });

        function adj(id, v) {
            if(isBet || isQ) return;
            let el = document.getElementById(id), n = parseFloat(el.value) + v;
            if(id==='auto') n = Math.max(1.1, parseFloat(n.toFixed(1)));
            if(id==='stake') n = Math.max(50, Math.floor(n));
            el.value = (id==='auto') ? n.toFixed(1) : n;
        }

        function engine() {
            const now = Date.now(), cycle = 15000, ms = now % cycle, rid = Math.floor(now / cycle);
            const tag = document.getElementById('stateTag'), rkt = document.getElementById('rocket'),
                  txt = document.getElementById('multUI'), btn = document.getElementById('mainBtn'),
                  nav = document.getElementById('exitBtn'),
                  s1 = document.getElementById('s1'), s2 = document.getElementById('s2'),
                  bR = document.getElementById('betRing'), sR = document.getElementById('syncRing'),
                  blast = document.getElementById('blast');

            if (rid !== ridCur) {
                ridCur = rid;
                if(isQ){ isBet = true; isQ = false; } else { isBet = false; }
                isOut = false;
                txt.style.color = "white";
                blast.classList.remove('active');
                sR.classList.remove('blink');
            }

            // UI LOCKING LOGIC
            const activeSession = isBet || isQ;
            nav.classList.toggle('locked', activeSession);
            s1.classList.toggle('locked', activeSession);
            s2.classList.toggle('locked', activeSession);

            if (ms < 5000) {
                tag.innerText = `WAITING FOR LAUNCH: ${5 - Math.floor(ms/1000)}S`;
                bR.style.display = 'block'; sR.style.display = 'none';
                bR.style.strokeDashoffset = 754 - (ms/5000) * 754;
                rkt.style.display = 'none'; txt.innerText = "1.00x";
                
                if(!isBet && !isQ) { 
                    btn.disabled = false; btn.innerText = "LAUNCH ROCKET"; btn.className = "btn-main bet-on"; 
                } else { 
                    btn.disabled = true; btn.innerText = isQ ? "QUEUED" : "LOCKED IN"; 
                }
            } 
            else if (ms < 13000) {
                bR.style.display = 'none';
                const elap = (ms - 5000) / 1000;
                const crash = getHouseLogic(rid);
                const mult = 1.0 + (elap * 0.35) * (1 + elap/5);

                if (mult < crash) {
                    tag.innerText = "FLIGHT IN PROGRESS"; sR.style.display = 'none';
                    rkt.style.display = 'block'; rkt.style.transform = `rotate(${elap * 130}deg)`;
                    txt.innerText = mult.toFixed(2) + "x";
                    
                    if (isBet && !isOut) {
                        const target = parseFloat(document.getElementById('auto').value);
                        if (mult >= target) doCashout(mult);
                        else {
                            btn.disabled = false; btn.className = "btn-main cash-on";
                            const potential = Math.floor(parseFloat(document.getElementById('stake').value)*mult);
                            btn.innerText = `CASHOUT ₦${potential}`;
                            window.vM = mult;
                        }
                    } else { 
                        btn.disabled = true; btn.innerText = isOut ? "SECURED" : "FLYING"; 
                    }
                } else {
                    if(!blast.classList.contains('active')) blast.classList.add('active');
                    tag.innerText = "EXPLODED!"; rkt.style.display = 'none';
                    txt.innerText = "BOOM!"; txt.style.color = "var(--danger)";
                    btn.disabled = true; btn.innerText = "CRASHED";
                    sR.style.display = 'block'; sR.classList.add('blink');
                }
            } else {
                tag.innerText = "RELOADING..."; bR.style.display = 'none';
                rkt.style.display = 'none'; btn.disabled = true;
                sR.style.display = 'block'; sR.classList.add('blink');
            }
            requestAnimationFrame(engine);
        }

        function getHouseLogic(id) {
            const stake = parseFloat(document.getElementById('stake').value);
            const ratio = stake / (bal + stake);
            let seed = (id * 47.9) % 10;

            // PROTECT HOUSE: If user bets > 40% of balance, crash very early
            if (isBet && ratio >= 0.4) return 1.05 + (seed / 80);

            // 70/30 Distribution (Loss/Win)
            const wins = [(id*2)%10, (id*5)%10, (id*8)%10];
            if (wins.includes(id % 10)) {
                return 2.2 + (seed % 1.5); // Win: 2.2x to 3.7x
            } else {
                return 1.03 + (seed / 50); // Loss: 1.03x to 1.2x
            }
        }

        async function handleInput() {
            const btn = document.getElementById('mainBtn');
            const stakeInp = document.getElementById('stake').value;
            const amt = parseFloat(stakeInp);

            if (btn.classList.contains('bet-on')) {
                if (!stakeInp || isNaN(amt) || amt < 50) return showPop("MIN STAKE ₦50");
                if (amt > bal) return showPop("INSUFFICIENT FUNDS");

                btn.disabled = true;
                const ms = Date.now() % 15000;
                if (ms < 5000) isBet = true; else isQ = true;

                setBal(bal - amt);
                await db.collection('users').doc(auth.currentUser.uid).update({ 
                    balance: firebase.firestore.FieldValue.increment(-amt) 
                });
            } else if (btn.classList.contains('cash-on')) {
                doCashout();
            }
        }

        async function doCashout(forcedMult = null) {
            if(isOut || !isBet) return;
            isOut = true;
            const res = forcedMult || window.vM;
            const win = Math.floor(parseFloat(document.getElementById('stake').value) * res);
            
            setBal(bal + win);
            document.getElementById('multUI').style.color = "var(--success)";
            showPop(`WIN +₦${win}`);

            await db.collection('users').doc(auth.currentUser.uid).update({ 
                balance: firebase.firestore.FieldValue.increment(win) 
            });
        }

        engine();
    </script>
</body>
</html>
