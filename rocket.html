<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Rocket Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #ef4444; --dark: #020617; --white: #ffffff;
            --gold: #facc15; --danger: #ff3e3e; --success: #10b981;
            --glass: rgba(255, 255, 255, 0.05);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }

        body {
            height: 100dvh; width: 100vw; font-family: var(--font);
            background: var(--dark); color: white; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed;
        }

        header { 
            width: 100%; padding: 12px 18px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(15, 23, 42, 0.95); z-index: 100;
        }
        
        .nav-btn { 
            color: white; text-decoration: none; font-weight: 800; background: var(--glass); 
            padding: 8px 14px; border-radius: 12px; font-size: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn.locked { opacity: 0.1; pointer-events: none; filter: blur(4px); }

        .bal-wrap { 
            background: white; color: var(--dark); padding: 7px 15px; border-radius: 20px; 
            font-weight: 950; font-size: 14px; cursor: pointer;
        }

        /* STAGE */
        .stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; }

        .loader-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .loader-svg circle { fill: none; stroke-width: 5; stroke-dasharray: 754; stroke-linecap: round; }
        
        #betRing { stroke: var(--success); display: none; }
        #syncRing { stroke: var(--danger); display: none; stroke-dashoffset: 0; }
        .blink { animation: blinker 0.6s infinite; }
        @keyframes blinker { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .supernova {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--danger) 0%, transparent 60%);
            opacity: 0; pointer-events: none; z-index: 4; border-radius: 50%;
        }
        .supernova.active { animation: supernovaEffect 0.6s ease-out forwards; }
        @keyframes supernovaEffect { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1.1); opacity: 0; } }

        .orbit {
            position: relative; width: 210px; height: 210px;
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        #rocket {
            position: absolute; width: 18px; height: 18px; background: var(--p1); 
            border-radius: 50%; box-shadow: 0 0 15px var(--p1);
            top: -9px; left: 50%; margin-left: -9px; transform-origin: center 114px;
            display: none; z-index: 6;
        }

        .mult-val { font-size: 50px; font-weight: 950; text-align: center; z-index: 10; letter-spacing: -2px; }
        .status-txt { position: absolute; top: -10%; width: 100%; text-align: center; font-size: 9px; font-weight: 950; color: var(--gold); letter-spacing: 3px; }

        /* DASHBOARD */
        .terminal { background: #0f172a; padding: 25px 15px 45px; border-top-left-radius: 40px; border-top-right-radius: 40px; }
        .panel { background: rgba(2, 6, 23, 0.6); padding: 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }

        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .col label { font-size: 8px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; }

        /* INPUTS LOCK STATE */
        .stepper { display: flex; align-items: center; background: #010410; border-radius: 14px; border: 1px solid #1e293b; height: 50px; overflow: hidden; transition: 0.3s; }
        .stepper.locked { opacity: 0.3; pointer-events: none; border-color: #ef4444; }
        
        .s-btn { width: 40px; height: 100%; background: none; border: none; color: white; font-size: 22px; }
        .val-i { flex: 1; background: none; border: none; color: var(--gold); text-align: center; font-size: 18px; font-weight: 900; width: 30px; -moz-appearance: textfield; }
        .val-i::-webkit-inner-spin-button, .val-i::-webkit-outer-spin-button { -webkit-appearance: none; }

        .btn-main {
            width: 100%; height: 70px; border-radius: 20px; border: none;
            background: #1e293b; color: white; font-size: 20px; font-weight: 950;
            text-transform: uppercase; box-shadow: 0 7px 0 #000;
        }
        .btn-main.bet-on { background: var(--success); box-shadow: 0 7px 0 #064e3b; }
        .btn-main.cash-on { background: var(--gold); color: #000; box-shadow: 0 7px 0 #a16207; }
        .btn-main:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 3px 0 #000; }
        .btn-main:disabled { opacity: 0.4; }

        #alert-box {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 25px; border-radius: 50px;
            font-weight: 900; font-size: 13px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s;
        }
        #alert-box.show { top: 80px; }
    </style>
</head>
<body>

    <div id="alert-box"><span></span></div>

    <header>
        <a href="game.html" id="exitBtn" class="nav-btn">✕ LEAVE</a>
        <div class="bal-wrap" id="balDisplay" onclick="adminEdit()">₦<span id="uiBal">0.00</span></div>
    </header>

    <main class="stage">
        <div class="status-txt" id="stateTag">READY</div>
        <div class="supernova" id="blast"></div>
        
        <div class="radar">
            <svg class="loader-svg">
                <circle cx="130" cy="130" r="120" id="betRing"></circle>
                <circle cx="130" cy="130" r="120" id="syncRing"></circle>
            </svg>
            <div class="orbit">
                <div id="multUI" class="mult-val">1.00x</div>
                <div id="rocket"></div>
            </div>
        </div>
    </main>

    <div class="terminal">
        <div class="panel">
            <div class="row">
                <div class="col">
                    <label>STAKE</label>
                    <div class="stepper" id="s1">
                        <button class="s-btn" onclick="adj('stake', -50)">−</button>
                        <input type="number" id="stake" class="val-i" value="100" readonly>
                        <button class="s-btn" onclick="adj('stake', 50)">+</button>
                    </div>
                </div>
                <div class="col">
                    <label>AUTO</label>
                    <div class="stepper" id="s2">
                        <button class="s-btn" onclick="adj('auto', -0.1)">−</button>
                        <input type="number" id="auto" class="val-i" value="2.0" step="0.1" readonly>
                        <button class="s-btn" onclick="adj('auto', 0.1)">+</button>
                    </div>
                </div>
            </div>
            <button id="mainBtn" class="btn-main" onclick="handleInput()">SYNCING...</button>
        </div>
    </div>

    <script>
        const config = { 
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40", 
            authDomain: "swiftduel.firebaseapp.com", 
            projectId: "swiftduel", 
            storageBucket: "swiftduel.firebasestorage.app", 
            messagingSenderId: "114652592444", 
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639" 
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let bal = 0, isBet = false, isQ = false, isOut = false, ridCur = 0, clicks = 0;

        function setBal(n) { 
            bal = Math.max(0, n); 
            document.getElementById('uiBal').innerText = bal.toLocaleString(undefined, {minimumFractionDigits:2});
        }

        function adminEdit() {
            clicks++;
            if(clicks >= 5) {
                const n = prompt("Enter Amount:", bal);
                if(n && !isNaN(n)) {
                    const v = parseFloat(n);
                    setBal(v);
                    db.collection('users').doc(auth.currentUser.uid).update({ balance: v });
                }
                clicks = 0;
            }
            setTimeout(() => clicks = 0, 2000);
        }

        auth.onAuthStateChanged(u => {
            if(u) db.collection('users').doc(u.uid).onSnapshot(s => { 
                if(!isBet && !isQ) setBal(s.data().balance || 0); 
            });
        });

        function adj(id, v) {
            let el = document.getElementById(id), n = parseFloat(el.value) + v;
            if(id==='auto') n = Math.max(1.1, parseFloat(n.toFixed(1)));
            if(id==='stake') n = Math.max(50, Math.floor(n));
            el.value = (id==='auto') ? n.toFixed(1) : n;
        }

        function engine() {
            const now = Date.now(), cycle = 15000, ms = now % cycle, rid = Math.floor(now / cycle);
            const tag = document.getElementById('stateTag'), rkt = document.getElementById('rocket'),
                  txt = document.getElementById('multUI'), btn = document.getElementById('mainBtn'),
                  nav = document.getElementById('exitBtn'),
                  s1 = document.getElementById('s1'), s2 = document.getElementById('s2'),
                  bR = document.getElementById('betRing'), sR = document.getElementById('syncRing'),
                  blast = document.getElementById('blast');

            if (rid !== ridCur) {
                ridCur = rid;
                if(isQ){ isBet = true; isQ = false; } else { isBet = false; }
                isOut = false;
                txt.style.color = "white";
                blast.classList.remove('active');
                sR.classList.remove('blink');
            }

            // LOCK ALL UI IF BETTING
            const active = isBet || isQ;
            nav.classList.toggle('locked', active);
            s1.classList.toggle('locked', active);
            s2.classList.toggle('locked', active);

            if (ms < 5000) {
                tag.innerText = `BETTING WINDOW: ${5 - Math.floor(ms/1000)}S`;
                bR.style.display = 'block'; sR.style.display = 'none';
                bR.style.strokeDashoffset = 754 - (ms/5000) * 754;
                rkt.style.display = 'none'; txt.innerText = "1.00x";
                if(!isBet && !isQ) { btn.disabled = false; btn.innerText = "PLACE BET"; btn.className = "btn-main bet-on"; }
                else { btn.disabled = true; btn.innerText = isQ ? "QUEUED" : "LOCKED IN"; }
            } 
            else if (ms < 12500) {
                bR.style.display = 'none';
                const elap = (ms - 5000) / 1000;
                const crash = getHardLogic(rid);
                const mult = 1.0 + (elap * 0.35) * (1 + elap/4.5);

                if (mult < crash) {
                    tag.innerText = "IN FLIGHT"; sR.style.display = 'none';
                    rkt.style.display = 'block'; rkt.style.transform = `rotate(${elap * 140}deg)`;
                    txt.innerText = mult.toFixed(2) + "x";
                    if (isBet && !isOut) {
                        const target = parseFloat(document.getElementById('auto').value);
                        if (mult >= target) doCashout(mult);
                        else {
                            btn.disabled = false; btn.className = "btn-main cash-on";
                            btn.innerText = `CASH ₦${Math.floor(parseFloat(document.getElementById('stake').value)*mult)}`;
                            window.vM = mult;
                        }
                    } else { btn.disabled = true; btn.innerText = isOut ? "WON!" : "LIVE"; }
                } else {
                    if(!blast.classList.contains('active')) blast.classList.add('active');
                    tag.innerText = "CRASHED!"; rkt.style.display = 'none';
                    txt.innerText = "LOST!"; txt.style.color = "var(--danger)";
                    btn.disabled = true; btn.innerText = "OVER";
                    sR.style.display = 'block'; sR.classList.add('blink');
                }
            } else {
                tag.innerText = "PREPARING..."; bR.style.display = 'none';
                rkt.style.display = 'none'; btn.disabled = true;
                sR.style.display = 'block'; sR.classList.add('blink');
            }
            requestAnimationFrame(engine);
        }

        // HARD HOUSE LOGIC: 7 Losses (Very low crash) / 3 Wins (Limited)
        function getHardLogic(id) {
            const stake = parseFloat(document.getElementById('stake').value);
            const ratio = stake / bal;
            let seed = (id * 41.3) % 10;

            // MASS PROTECTION: If user bets 50% balance, swallow instantly
            if (activeBet() && ratio >= 0.5) return 1.01 + (seed / 100);

            // 7:3 SCATTER
            const wins = [(id*3)%10, (id*7)%10, (id*9)%10];
            const isWin = wins.includes(id % 10);

            if (isWin) {
                // Winning round: Usually ~2.5x, occasionally 3x.
                return 2.1 + (seed % 1.2); 
            } else {
                // Scalp-Killer: Most losses happen before 1.12x to kill "safe" bets
                return 1.02 + (seed / 45); 
            }
        }

        function activeBet() { return isBet || isQ; }

        async function handleInput() {
            const btn = document.getElementById('mainBtn');
            if (btn.classList.contains('bet-on')) {
                const amt = parseFloat(document.getElementById('stake').value);
                if (amt < 50 || amt > bal) return showPop(amt < 50 ? "Min ₦50" : "Low Funds");

                btn.disabled = true;
                const ms = Date.now() % 15000;
                if (ms < 5000) isBet = true; else isQ = true;

                setBal(bal - amt);
                await db.collection('users').doc(auth.currentUser.uid).update({ 
                    balance: firebase.firestore.FieldValue.increment(-amt) 
                });
            } else if (btn.classList.contains('cash-on')) doCashout();
        }

        async function doCashout(m = null) {
            if(isOut || !isBet) return;
            isOut = true;
            const res = m || window.vM;
            const win = Math.floor(parseFloat(document.getElementById('stake').value) * res);
            
            setBal(bal + win);
            document.getElementById('multUI').style.color = "var(--success)";
            showPop(`WON ₦${win}`, "win");

            await db.collection('users').doc(auth.currentUser.uid).update({ 
                balance: firebase.firestore.FieldValue.increment(win) 
            });
        }

        function showPop(msg) {
            const p = document.getElementById('alert-box');
            p.className = `show`;
            p.querySelector('span').innerText = msg;
            setTimeout(() => p.classList.remove('show'), 2500);
        }

        engine();
    </script>
</body>
</html>
