<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwiftDuel | Predator Prism Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1; 
            --danger: #f43f5e; 
            --success: #10b981;
            --bg: #070b14; 
            --card: rgba(30, 41, 59, 0.6); 
            --text: #f8fafc; 
            --gold: #facc15;
            --neon: 0 0 25px rgba(99, 102, 241, 0.4);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            user-select: none;
            margin: 0; padding: 0;
        }

        body {
            height: 100dvh; width: 100vw;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #020617;
            color: var(--text);
            display: flex; flex-direction: column; 
            overflow: hidden; position: fixed;
        }

        .prism-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            z-index: -1;
        }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 28px;
            border-radius: 50px; font-weight: 950; font-size: 13px;
            z-index: 5000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #toast.active { top: 25px; }

        header { 
            height: 70px; width: 100%; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }

        #exitBtn {
            text-decoration: none; color: #fff; font-weight: 900; 
            background: rgba(255,255,255,0.1); width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; transition: 0.3s;
        }
        #exitBtn.disabled { opacity: 0.1; pointer-events: none; filter: blur(2px); }

        .bal-pill { 
            background: #fff; color: #000; padding: 8px 18px; 
            border-radius: 50px; font-weight: 950; font-size: 14px;
            box-shadow: var(--neon);
        }

        .arena-main {
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-evenly;
            padding: 10px 20px; z-index: 10; position: relative;
        }

        .status-box { text-align: center; }
        .status-box h1 { 
            font-size: 24px; font-weight: 950; letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #subtext { 
            font-size: 9px; font-weight: 900; color: #6366f1; 
            letter-spacing: 4px; margin-top: 5px; text-transform: uppercase;
        }

        .board-container {
            width: 100%; max-width: 320px;
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
        }

        .board {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%; height: 100%;
        }

        .cell {
            background: var(--card); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; font-weight: 950;
            border: 1px solid rgba(255,255,255,0.08); 
            transition: 0.15s;
        }
        .cell.taken { pointer-events: none; opacity: 0.8; }
        .cell.x { color: #fff; text-shadow: 0 0 15px var(--primary); }
        .cell.o { color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        .cell:active { transform: scale(0.92); }

        #betSection {
            width: 100%; max-width: 320px; 
            background: rgba(30, 41, 59, 0.4);
            padding: 15px; border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            transition: 0.5s cubic-bezier(0.4, 0, 1, 1);
        }
        #betSection.hidden { opacity: 0; transform: translateY(50px) scale(0.9); pointer-events: none; visibility: hidden; }

        .input-group { position: relative; margin-bottom: 10px; }
        .input-group span { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-weight: 900; color: var(--gold); }
        .bet-input {
            width: 100%; padding: 14px 14px 14px 35px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); font-size: 18px; 
            font-weight: 950; color: var(--gold); text-align: center;
        }

        .action-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #6366f1, #4338ca);
            color: white; font-weight: 950; font-size: 14px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal {
            background: #1e293b; padding: 35px 25px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 85%; max-width: 300px;
        }
        .modal h2 { font-size: 38px; font-weight: 950; margin-bottom: 10px; }
        .modal p { color: #94a3b8; font-weight: 700; margin-bottom: 25px; font-size: 18px; }
        .modal button {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: #fff; color: #000; font-weight: 950;
        }

        .system-logs {
            width: 100%; display: flex; justify-content: space-between;
            padding: 5px 20px; font-size: 8px; font-weight: 800; color: #475569;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="prism-bg"></div>

    <div id="toast">MINIMUM ₦50</div>

    <header>
        <a href="game.html" id="exitBtn">✕</a>
        <div class="bal-pill">₦<span id="balDisplay">0.00</span></div>
    </header>

    <main class="arena-main">
        <div class="status-box">
            <h1>PRISM ELITE</h1>
            <div id="subtext">System Synchronized</div>
        </div>

        <div class="board-container">
            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <div id="betSection">
            <div class="input-group">
                <span>₦</span>
                <input type="number" id="stakeInput" class="bet-input" placeholder="0">
            </div>
            <button id="stakeBtn" class="action-btn" onclick="initiateDuel()">CONFIRM DUEL</button>
        </div>
    </main>

    <div class="system-logs">
        <span>Prism_Neural_V4</span>
        <span>Secure_Connection_Established</span>
    </div>

    <div id="resOverlay" class="overlay">
        <div class="modal">
            <h2 id="resHeader">WON</h2>
            <p id="resSub"></p>
            <button onclick="closeResult()">CONTINUE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
            authDomain: "swiftduel.firebaseapp.com",
            projectId: "swiftduel",
            storageBucket: "swiftduel.firebasestorage.app",
            messagingSenderId: "114652592444",
            appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userBalance = parseFloat(localStorage.getItem('swiftBalance')) || 0;
        let isDuelActive = false;
        let firstTurn = "ai"; 
        let boardState = ["", "", "", "", "", "", "", "", ""];
        const pSym = "X", aiSym = "O";

        document.getElementById('balDisplay').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits: 2});

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2500);
        }

        async function initiateDuel() {
            const stakeRaw = document.getElementById('stakeInput').value;
            const stake = parseFloat(stakeRaw);

            // FIX: Validate that stake is a real number and not empty
            if(!stakeRaw || isNaN(stake) || stake < 50) return showToast("MINIMUM ₦50 REQUIRED");
            if(stake > userBalance) return showToast("INSUFFICIENT BALANCE");

            document.getElementById('betSection').classList.add('hidden');
            document.getElementById('exitBtn').classList.add('disabled');

            isDuelActive = true;
            updateBalanceRemote(-stake);
            
            if(firstTurn === "ai") {
                document.getElementById('subtext').innerText = "AI PREPARING...";
                setTimeout(() => {
                    const aiMove = minimax(boardState, aiSym, stake >= (userBalance * 0.5)).idx;
                    applyCellMove(aiMove, aiSym);
                    document.getElementById('subtext').innerText = "YOUR TURN (X)";
                }, 600);
            } else {
                document.getElementById('subtext').innerText = "YOUR TURN (X)";
            }
        }

        document.querySelectorAll('.cell').forEach(c => {
            c.addEventListener('click', () => {
                const i = c.dataset.index;
                if(!isDuelActive || boardState[i] !== "") return;

                applyCellMove(i, pSym);
                if(checkWin(boardState, pSym)) return concludeDuel("win");
                if(boardState.every(s => s !== "")) return concludeDuel("draw");

                isDuelActive = false;
                document.getElementById('subtext').innerText = "AI THINKING...";
                
                setTimeout(() => {
                    const stake = parseFloat(document.getElementById('stakeInput').value);
                    const aiMove = minimax(boardState, aiSym, stake >= (userBalance * 0.5)).idx;
                    applyCellMove(aiMove, aiSym);
                    
                    if(checkWin(boardState, aiSym)) return concludeDuel("lose");
                    if(boardState.every(s => s !== "")) return concludeDuel("draw");
                    
                    isDuelActive = true;
                    document.getElementById('subtext').innerText = "YOUR TURN (X)";
                }, 500);
            });
        });

        function applyCellMove(i, s) {
            boardState[i] = s;
            const el = document.querySelector(`[data-index='${i}']`);
            el.innerText = s;
            el.classList.add(s.toLowerCase(), 'taken');
        }

        function minimax(board, player, isCunny) {
            const avail = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (checkWin(board, pSym)) return { score: -10 };
            if (checkWin(board, aiSym)) return { score: 10 };
            if (avail.length === 0) return { score: 0 };

            const moves = [];
            for (let i = 0; i < avail.length; i++) {
                let m = { idx: avail[i] };
                board[avail[i]] = player;
                m.score = minimax(board, player === aiSym ? pSym : aiSym, isCunny).score;
                board[avail[i]] = "";
                moves.push(m);
            }

            let best;
            if(player === aiSym) {
                let high = -1000;
                for(let i=0; i<moves.length; i++) { if(moves[i].score > high) { high = moves[i].score; best = i; } }
            } else {
                let low = 1000;
                for(let i=0; i<moves.length; i++) { if(moves[i].score < low) { low = moves[i].score; best = i; } }
            }
            return moves[best];
        }

        function checkWin(b, p) {
            const winPaths = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return winPaths.some(path => path.every(i => b[i] === p));
        }

        async function updateBalanceRemote(amt) {
            const user = auth.currentUser;
            if(user) {
                // Ensuring we don't send NaN to the database
                if(isNaN(amt)) return; 
                
                await db.collection('users').doc(user.uid).update({ balance: firebase.firestore.FieldValue.increment(amt) });
                const snap = await db.collection('users').doc(user.uid).get();
                userBalance = snap.data().balance;
                document.getElementById('balDisplay').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                localStorage.setItem('swiftBalance', userBalance);
            }
        }

        function concludeDuel(res) {
            isDuelActive = false;
            const stake = parseFloat(document.getElementById('stakeInput').value);
            const overlay = document.getElementById('resOverlay');
            const h = document.getElementById('resHeader');
            const s = document.getElementById('resSub');

            if(res === "win") {
                h.innerText = "WON"; h.style.color = "var(--success)";
                s.innerText = `+ ₦${(stake * 0.95).toFixed(2)}`;
                updateBalanceRemote(stake * 1.95);
                firstTurn = "ai";
            } else if(res === "draw") {
                h.innerText = "TIED"; h.style.color = "#94a3b8";
                s.innerText = "Refunded";
                updateBalanceRemote(stake);
                firstTurn = (firstTurn === "ai") ? "player" : "ai";
            } else {
                h.innerText = "LOSE"; h.style.color = "var(--danger)";
                s.innerText = `- ₦${stake.toFixed(2)}`;
                firstTurn = "player";
            }
            overlay.style.display = "flex";
        }

        function closeResult() {
            boardState = ["", "", "", "", "", "", "", "", ""];
            document.querySelectorAll('.cell').forEach(c => { c.innerText = ""; c.className = 'cell'; });
            document.getElementById('resOverlay').style.display = "none";
            document.getElementById('betSection').classList.remove('hidden');
            document.getElementById('exitBtn').classList.remove('disabled');
            document.getElementById('subtext').innerText = "DUEL READY";
        }
    </script>
</body>
</html>
