<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwiftDuel | Titan Cards Dual</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --dark: #070b14;
            --glass: rgba(255, 255, 255, 0.05); --gold: #facc15;
            --danger: #ff4757; --success: #2ed573;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; user-select: none; }

        body {
            width: 100vw; height: 100dvh; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, #070b14);
            color: white; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed; 
        }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--danger); color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: 800; font-size: 13px; z-index: 5000;
            transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.active { top: 20px; }

        header { 
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(7, 11, 20, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        #exitBtn {
            color:white; text-decoration:none; font-weight:900; background:var(--glass); 
            width:40px; height:40px; border-radius:12px; display:flex; align-items:center; 
            justify-content:center;
        }
        #exitBtn.locked { opacity: 0; pointer-events: none; }

        .bal-pill { background: white; color: var(--dark); padding: 10px 20px; border-radius: 50px; font-weight: 950; font-size: 15px; }

        .game-zone { flex: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 20px; }

        .duel-stage { display: flex; gap: 20px; perspective: 1000px; }
        .card-slot { text-align: center; }
        .card-label { font-size: 10px; font-weight: 900; color: #94a3b8; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }

        .card {
            width: 130px; height: 190px; background: white; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--dark); font-size: 50px; font-weight: 950;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative;
            transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
        }
        .card.red { color: #e11d48; }
        .card.flipping { transform: rotateY(180deg) scale(0.8); opacity: 0.3; }
        .card.user-active { border-color: var(--gold); box-shadow: 0 0 30px rgba(250, 204, 21, 0.6); cursor: pointer; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .suit { position: absolute; font-size: 22px; }
        .top-left { top: 12px; left: 12px; }
        .bottom-right { bottom: 12px; right: 12px; }

        .controls {
            width: 100%; max-width: 360px; background: var(--glass);
            padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; backdrop-filter: blur(10px); transition: 0.4s;
        }
        .controls.hidden { opacity: 0.05; pointer-events: none; filter: blur(4px); }

        .stake-row { position: relative; margin-bottom: 15px; }
        .stake-row span { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-weight: 950; color: var(--gold); font-size: 20px; }
        .stake-row input {
            width: 100%; background: #000; border: 2px solid #1e293b; color: white;
            padding: 18px 15px 18px 45px; border-radius: 18px; font-size: 24px; font-weight: 950;
        }

        .bet-btn {
            width: 100%; padding: 22px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--p1), var(--p2));
            color: white; font-size: 16px; font-weight: 950; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .bet-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .overlay { position: fixed; inset: 0; background: rgba(7, 11, 20, 0.99); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal { background: white; color: var(--dark); padding: 50px 30px; border-radius: 45px; text-align: center; width: 90%; max-width: 340px; }
    </style>
</head>
<body>

<div id="toast">ERROR</div>

<header>
    <a href="game.html" id="exitBtn">✕</a>
    <div class="bal-pill">₦<span id="balUI">0.00</span></div>
</header>

<div class="game-zone">
    <div style="text-align:center">
        <h1 style="font-weight:950; font-size:32px; letter-spacing:-1px;">TITAN CARDS</h1>
        <p id="statusMsg" style="font-size:10px; font-weight:900; color:var(--p2); letter-spacing:3px;">INITIALIZING SYNC...</p>
    </div>

    <div class="duel-stage">
        <div class="card-slot">
            <div class="card-label">TITAN</div>
            <div id="titanCard" class="card">?</div>
        </div>
        <div class="card-slot">
            <div class="card-label">PLAYER</div>
            <div id="userCard" class="card" onclick="handleCardReveal()">?</div>
        </div>
    </div>

    <div class="controls" id="controlPanel">
        <div class="stake-row">
            <span>₦</span>
            <input type="number" id="stake" value="100" inputmode="decimal">
        </div>
        <button class="bet-btn" id="mainBetBtn" onclick="initiateBet()" disabled>CONNECTING...</button>
    </div>
</div>

<div id="resOverlay" class="overlay">
    <div class="modal">
        <h1 id="resTitle" style="font-size:50px; font-weight:950; letter-spacing:-2px;">LOSS</h1>
        <p id="resSub" style="margin:20px 0 30px; font-weight:800; color:#64748b; font-size:18px;"></p>
        <button onclick="resetGame()" style="width:100%; padding:22px; border:none; border-radius:20px; background:var(--dark); color:white; font-weight:950; letter-spacing:1px; font-size:14px;">CONTINUE BATTLE</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40", authDomain: "swiftduel.firebaseapp.com", projectId: "swiftduel", storageBucket: "swiftduel.firebasestorage.app", messagingSenderId: "114652592444", appId: "1:114652592444:web:19ce34c0a6af62c4de0639" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const SUITS = ['♠', '♣', '♥', '♦'];
    let balance = parseFloat(localStorage.getItem('swiftBalance')) || 0;
    let betPlaced = false;
    let isRevealing = false;
    let serverLocked = true;

    // SCATTER SYSTEM: Generate a shuffled sequence for 10 rounds
    function generateEntropy() {
        let sequence = ["W", "W", "D", "L", "L", "L", "L", "L", "L", "L"];
        for (let i = sequence.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [sequence[i], sequence[j]] = [sequence[j], sequence[i]];
        }
        localStorage.setItem('card_entropy', JSON.stringify(sequence));
        localStorage.setItem('card_ptr', "0");
    }

    if (!localStorage.getItem('card_entropy')) generateEntropy();

    function notify(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function syncBal(v) {
        if(isNaN(v)) v = 0; balance = v;
        document.getElementById('balUI').innerText = balance.toLocaleString(undefined, {minimumFractionDigits:2});
        localStorage.setItem('swiftBalance', balance);
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                serverLocked = false;
                document.getElementById('mainBetBtn').disabled = false;
                document.getElementById('mainBetBtn').innerText = "PLACE BET";
                document.getElementById('statusMsg').innerText = "READY FOR BATTLE";
                if(doc.exists && !betPlaced && !isRevealing) syncBal(doc.data().balance || 0);
            });
        }
    });

    async function initiateBet() {
        if(serverLocked || betPlaced) return;
        const stakeVal = document.getElementById('stake').value;
        const stake = parseFloat(stakeVal);
        
        if(!stakeVal || stake < 50) return notify("MINIMUM ₦50");
        if(stake > balance) return notify("INSUFFICIENT FUNDS");

        betPlaced = true;
        serverLocked = true;
        document.getElementById('mainBetBtn').disabled = true;
        
        syncBal(balance - stake);
        try {
            await db.collection('users').doc(auth.currentUser.uid).update({ 
                balance: firebase.firestore.FieldValue.increment(-stake) 
            });
            document.getElementById('controlPanel').classList.add('hidden');
            document.getElementById('exitBtn').classList.add('locked');
            document.getElementById('statusMsg').innerText = "TAP YOUR CARD!";
            document.getElementById('userCard').classList.add('user-active');
        } catch (e) {
            betPlaced = false; serverLocked = false; notify("SYNC ERROR");
        }
    }

    function renderCard(el, val) {
        const suit = SUITS[Math.floor(Math.random()*4)];
        el.innerHTML = `<span class="suit top-left">${suit}</span><span>${val}</span><span class="suit bottom-right">${suit}</span>`;
        el.className = (suit === '♥' || suit === '♦') ? 'card red' : 'card';
    }

    function handleCardReveal() {
        if(!betPlaced || isRevealing) return;
        isRevealing = true;
        
        const uCard = document.getElementById('userCard');
        const tCard = document.getElementById('titanCard');
        uCard.classList.remove('user-active');
        uCard.classList.add('flipping');

        setTimeout(() => {
            uCard.classList.remove('flipping');
            const stake = parseFloat(document.getElementById('stake').value);
            
            // CHAOS LOGIC ENGINE
            let entropy = JSON.parse(localStorage.getItem('card_entropy'));
            let ptr = parseInt(localStorage.getItem('card_ptr'));
            
            if(ptr >= 10) { generateEntropy(); entropy = JSON.parse(localStorage.getItem('card_entropy')); ptr = 0; }
            
            let outcome = entropy[ptr];
            let pVal, tVal;
            const swallow = (stake >= (balance + stake) * 0.50);

            if (swallow) outcome = "L"; // INSTANT SWALLOW ON HIGH STAKE

            if (outcome === "W") {
                pVal = Math.floor(Math.random() * 5) + 10;
                tVal = Math.floor(Math.random() * (pVal - 2)) + 2;
            } else if (outcome === "D") {
                pVal = Math.floor(Math.random() * 9) + 4;
                tVal = pVal;
            } else {
                pVal = Math.floor(Math.random() * 7) + 2;
                tVal = Math.min(14, pVal + 1 + Math.floor(Math.random() * 2));
            }

            localStorage.setItem('card_ptr', ptr + 1);
            renderCard(uCard, pVal);
            
            setTimeout(() => {
                tCard.classList.add('flipping');
                setTimeout(() => {
                    tCard.classList.remove('flipping');
                    renderCard(tCard, tVal);
                    processOutcome(pVal, tVal, stake);
                }, 700);
            }, 400);
        }, 1000);
    }

    async function processOutcome(p, t, stake) {
        const overlay = document.getElementById('resOverlay');
        const tit = document.getElementById('resTitle');
        const sub = document.getElementById('resSub');

        if(p > t) {
            const payout = stake * 1.95;
            syncBal(balance + payout);
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(payout) });
            tit.innerText = "WON"; tit.style.color = "var(--success)";
            sub.innerText = `Clean victory. +₦${payout.toFixed(0)}`;
        } else if(p === t) {
            syncBal(balance + stake);
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(stake) });
            tit.innerText = "DRAW"; tit.style.color = "#64748b";
            sub.innerText = `Power match. Stake safe.`;
        } else {
            tit.innerText = "LOST"; tit.style.color = "var(--danger)";
            sub.innerText = `The Titan crushed your ${p}.`;
        }
        setTimeout(() => overlay.style.display = 'flex', 600);
    }

    function resetGame() {
        document.getElementById('resOverlay').style.display = 'none';
        document.getElementById('controlPanel').classList.remove('hidden');
        document.getElementById('exitBtn').classList.remove('locked');
        document.getElementById('userCard').innerHTML = "?";
        document.getElementById('titanCard').innerHTML = "?";
        document.getElementById('userCard').className = 'card';
        document.getElementById('titanCard').className = 'card';
        betPlaced = false;
        isRevealing = false;
        serverLocked = false;
    }

    syncBal(balance);
</script>
</body>
</html>
