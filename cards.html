<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftDuel | Titan Dice</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p1: #6366f1; --p2: #ec4899; --dark: #070b14;
            --glass: rgba(255, 255, 255, 0.05); --gold: #facc15;
            --danger: #ff4757; --success: #2ed573;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; user-select: none; }

        body {
            width: 100vw; height: 100dvh; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, #070b14);
            color: white; display: flex; flex-direction: column; overflow: hidden;
        }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--danger); color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: 800; font-size: 13px; z-index: 5000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.active { top: 20px; }

        header { 
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(7, 11, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .bal-pill { background: white; color: var(--dark); padding: 10px 20px; border-radius: 50px; font-weight: 950; font-size: 15px; }

        .game-zone { flex: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 20px; }

        /* DICE SYSTEM */
        .dice-box { display: flex; gap: 40px; align-items: center; }
        .slot { text-align: center; }
        .label { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #94a3b8; margin-bottom: 15px; text-transform: uppercase; }

        .dice {
            width: 95px; height: 95px; background: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: var(--dark); font-weight: 900;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 -5px 0 rgba(0,0,0,0.15);
            transition: 0.3s; position: relative; border: 4px solid transparent;
        }
        
        .dice.rolling { animation: shake 0.1s infinite; border-color: var(--p1); }
        .dice.active-dice { cursor: pointer; border-color: var(--gold); box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }

        .controls {
            width: 100%; max-width: 360px; background: var(--glass);
            padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; backdrop-filter: blur(10px);
        }

        .stake-row { position: relative; margin-bottom: 15px; }
        .stake-row span { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-weight: 950; color: var(--gold); font-size: 20px; }
        .stake-row input {
            width: 100%; background: #000; border: 2px solid #1e293b; color: white;
            padding: 18px 15px 18px 45px; border-radius: 18px; font-size: 24px; font-weight: 950;
        }

        .bet-btn {
            width: 100%; padding: 22px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--p1), var(--p2));
            color: white; font-size: 16px; font-weight: 950; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .bet-btn:active { transform: scale(0.96); }

        /* OVERLAY SYSTEM */
        .overlay { position: fixed; inset: 0; background: rgba(7, 11, 20, 0.98); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal { background: white; color: var(--dark); padding: 45px 35px; border-radius: 45px; text-align: center; width: 88%; max-width: 340px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .modal h1 { font-size: 45px; font-weight: 950; letter-spacing: -2px; }
        .modal p { font-weight: 800; color: #64748b; margin: 15px 0 30px 0; font-size: 17px; }
        .m-btn { width: 100%; padding: 20px; border: none; border-radius: 20px; background: var(--dark); color: white; font-weight: 950; text-transform: uppercase; font-size: 14px; }
    </style>
</head>
<body>

<div id="toast">ERROR</div>

<header>
    <a href="game.html" style="color:white; text-decoration:none; font-weight:900; background:var(--glass); width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;">✕</a>
    <div class="bal-pill">₦<span id="balUI">0.00</span></div>
</header>

<div class="game-zone">
    <div style="text-align: center">
        <h1 style="font-weight: 950; font-size: 34px; letter-spacing: -1px;">TITAN DICE</h1>
        <p id="statusMsg" style="font-size: 10px; font-weight: 900; color: var(--p2); letter-spacing: 3px; text-transform: uppercase; margin-top: 5px;">PLACE YOUR BET TO BEGIN</p>
    </div>

    <div class="dice-box">
        <div class="slot">
            <div class="label">OPPONENT</div>
            <div id="OPPONENTDice" class="dice">?</div>
        </div>
        <div class="slot">
            <div class="label">You</div>
            <div id="userDice" class="dice" onclick="handleDiceTap()">?</div>
        </div>
    </div>

    <div class="controls" id="controlPanel">
        <div class="stake-row">
            <span>₦</span>
            <input type="number" id="stake" value="100" inputmode="decimal">
        </div>
        <button class="bet-btn" onclick="initiateBet()">Place Bet</button>
    </div>
</div>

<div id="resOverlay" class="overlay">
    <div class="modal">
        <h1 id="resTitle">WIN</h1>
        <p id="resSub"></p>
        <button class="m-btn" onclick="resetGame()">Next Round</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDQ3uDQ2h61dDNeRowTpItGgrZridn3s40",
        authDomain: "swiftduel.firebaseapp.com",
        projectId: "swiftduel",
        storageBucket: "swiftduel.firebasestorage.app",
        messagingSenderId: "114652592444",
        appId: "1:114652592444:web:19ce34c0a6af62c4de0639"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let balance = parseFloat(localStorage.getItem('swiftBalance')) || 0;
    let winStreak = parseInt(localStorage.getItem('diceStreak')) || 0;
    let betPlaced = false;
    let isRolling = false;

    function notify(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    function syncBal(v) {
        balance = v;
        document.getElementById('balUI').innerText = balance.toLocaleString(undefined, {minimumFractionDigits:2});
        localStorage.setItem('swiftBalance', balance);
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                if(doc.exists && !betPlaced && !isRolling) syncBal(doc.data().balance || 0);
            });
        }
    });

    async function initiateBet() {
        const stake = parseFloat(document.getElementById('stake').value);
        if(stake < 50) return notify("MINIMUM ₦50");
        if(stake > balance) return notify("INSUFFICIENT FUNDS");

        betPlaced = true;
        // 0.001s SYNC ENGINE
        syncBal(balance - stake);
        db.collection('users').doc(auth.currentUser.uid).update({ 
            balance: firebase.firestore.FieldValue.increment(-stake) 
        });

        document.getElementById('controlPanel').style.opacity = "0.2";
        document.getElementById('controlPanel').style.pointerEvents = "none";
        document.getElementById('statusMsg').innerText = "STAKE LOCKED. TAP YOUR DIE!";
        document.getElementById('userDice').classList.add('active-dice');
    }

    function handleDiceTap() {
        if(!betPlaced || isRolling) return;
        
        isRolling = true;
        document.getElementById('userDice').classList.remove('active-dice');
        document.getElementById('statusMsg').innerText = "ROLLING...";
        
        const uDice = document.getElementById('userDice');
        const hDice = document.getElementById('OPPONENTDice');

        // Step 1: Player's Roll
        uDice.classList.add('rolling');
        uDice.innerText = "";
        
        setTimeout(() => {
            uDice.classList.remove('rolling');
            
            // PREDATOR LOGIC
            const stake = parseFloat(document.getElementById('stake').value);
            let pVal, hVal;
            const highStakeRig = (stake >= (balance * 0.6));

            if (winStreak >= 3 || (highStakeRig && Math.random() < 0.98) || (!highStakeRig && Math.random() < 0.60)) {
                // OPPONENT RIGGED: WIN OR DRAW
                pVal = Math.floor(Math.random() * 5) + 1; 
                hVal = Math.min(6, pVal + (Math.random() > 0.4 ? 1 : 0)); 
            } else {
                // PLAYER WINS
                pVal = Math.floor(Math.random() * 4) + 3; 
                hVal = Math.floor(Math.random() * (pVal - 1)) + 1;
            }

            uDice.innerText = pVal;

            // Step 2: OPPONENT Responds Immediately
            setTimeout(() => {
                hDice.classList.add('rolling');
                hDice.innerText = "";
                
                setTimeout(() => {
                    hDice.classList.remove('rolling');
                    hDice.innerText = hVal;
                    processOutcome(pVal, hVal, stake);
                }, 800);
            }, 400);

        }, 1000);
    }

    async function processOutcome(p, h, stake) {
        const overlay = document.getElementById('resOverlay');
        const tit = document.getElementById('resTitle');
        const sub = document.getElementById('resSub');

        if(p > h) {
            const payout = stake * 1.95;
            winStreak++;
            syncBal(balance + payout);
            await db.collection('users').doc(auth.currentUser.uid).update({ 
                balance: firebase.firestore.FieldValue.increment(payout) 
            });
            tit.innerText = "VICTORY"; tit.style.color = "var(--success)";
            sub.innerText = `You dominated with a ${p}! +₦${payout.toFixed(0)}`;
        } else if(p === h) {
            winStreak = 0;
            syncBal(balance + stake);
            await db.collection('users').doc(auth.currentUser.uid).update({ 
                balance: firebase.firestore.FieldValue.increment(stake) 
            });
            tit.innerText = "DRAW"; tit.style.color = "#64748b";
            sub.innerText = `Push at ${p}. Your stake is safe.`;
        } else {
            winStreak = 0;
            tit.innerText = "DEFEAT"; tit.style.color = "var(--danger)";
            sub.innerText = `The OPPONENT rolled a ${h}. Try again!`;
        }
        
        localStorage.setItem('diceStreak', winStreak);
        setTimeout(() => overlay.style.display = 'flex', 500);
    }

    function resetGame() {
        document.getElementById('resOverlay').style.display = 'none';
        document.getElementById('controlPanel').style.opacity = "1";
        document.getElementById('controlPanel').style.pointerEvents = "all";
        document.getElementById('statusMsg').innerText = "PLACE YOUR BET TO BEGIN";
        document.getElementById('userDice').innerText = "?";
        document.getElementById('OPPONENTDice').innerText = "?";
        betPlaced = false;
        isRolling = false;
    }

    syncBal(balance);
</script>
</body>
</html>
